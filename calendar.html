<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP's Dashboard – Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #0d0d1a 0%, #12122a 40%, #0f2045 100%);
      padding: 28px 32px 22px;
      border-bottom: 2px solid #1e2a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 0%, #c7d2fe 60%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left p {
      font-size: 0.82rem;
      color: #6b7aaa;
      margin-top: 4px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e8e8f0;
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .back-btn:hover {
      background: #e6007a;
      border-color: #e6007a;
    }

    .calendar-wrapper {
      padding: 32px 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .month-nav button {
      background: rgba(255,255,255,0.07);
      border: 1px solid #2a2a3e;
      color: #e8e8f0;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .month-nav button:hover {
      background: #e6007a;
      border-color: #e6007a;
    }

    .month-label {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-header {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #6b7280;
      padding: 8px 0;
    }

    .day-cell {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      min-height: 90px;
      padding: 8px;
      position: relative;
    }

    .day-cell.empty {
      background: transparent;
      border-color: transparent;
    }

    .day-cell.today {
      border-color: #e6007a;
      background: #1a1020;
    }

    .day-number {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .day-cell.today .day-number {
      color: #e6007a;
    }

    .event {
      display: block;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 3px 6px;
      border-radius: 5px;
      margin-bottom: 3px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
    }

    .event-film-out   { background: #166534; color: #4ade80; }
    .event-film-soon  { background: #78350f; color: #fbbf24; }
    .event-tv         { background: #1e3a5f; color: #60a5fa; }
    .event-estimated  { opacity: 0.75; }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #8888aa;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    .upcoming-list {
      margin-top: 40px;
    }

    .upcoming-list h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .upcoming-list h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e1e2e;
    }

    .upcoming-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1e1e2e;
    }

    .upcoming-date-badge {
      min-width: 60px;
      text-align: center;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fbbf24;
      line-height: 1.2;
    }

    .upcoming-date-badge.past {
      color: #4ade80;
    }

    .upcoming-title {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .upcoming-platform {
      font-size: 0.72rem;
      color: #6b7280;
      margin-top: 2px;
    }

    .tv-badge {
      display: inline-block;
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📅 Release Calendar</h1>
    <p>JP's Dashboard · Upcoming VOD & streaming dates</p>
  </div>
  <a class="back-btn" href="/" >← Back to Dashboard</a>
</header>

<div class="calendar-wrapper">

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#166534"></div> Film – Available</div>
    <div class="legend-item"><div class="legend-dot" style="background:#78350f"></div> Film – Coming Soon</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1e3a5f"></div> TV Show</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2a2a3e;border:1px dashed #6b7280"></div> Estimated date</div>
  </div>

  <div class="month-nav">
    <button onclick="changeMonth(-1)">← Prev</button>
    <span class="month-label" id="month-label"></span>
    <button onclick="changeMonth(1)">Next →</button>
  </div>

  <div class="calendar-grid" id="calendar-grid"></div>

  <div class="upcoming-list">
    <h2>All Upcoming Dates</h2>
    <div id="upcoming-list"></div>
  </div>

</div>

<script>
const TODAY = new Date();
TODAY.setHours(0,0,0,0);

const EVENTS = [
  // Films – already out
  { title: 'Wuthering Heights',         date: '2026-03-31', type: 'film-out',  platform: 'Digital / HBO Max',              estimated: false },
  { title: 'Lord of the Flies',          date: '2026-05-04', type: 'film-out',  platform: 'Netflix',                        estimated: false },
  { title: 'Ready or Not 2',             date: '2026-05-05', type: 'film-out',  platform: 'Digital (Amazon, iTunes, Vudu)', estimated: false },
  // Films – coming soon
  { title: 'Faces of Death',             date: '2026-05-12', type: 'film-soon', platform: 'Digital / Plex',                 estimated: false },
  { title: 'The Punisher: One Last Kill',date: '2026-05-12', type: 'film-soon', platform: 'Disney+',                        estimated: false },
  { title: "Lee Cronin's The Mummy",     date: '2026-05-19', type: 'film-soon', platform: 'Digital (Warner Bros.)',         estimated: true  },
  { title: 'The Boys – Prime Premiere',  date: '2026-05-20', type: 'film-soon', platform: 'Prime Video',                   estimated: false },
  { title: 'Over Your Dead Body',        date: '2026-05-26', type: 'film-soon', platform: 'IFC / Digital',                 estimated: false },
  { title: 'Hokum',                      date: '2026-06-02', type: 'film-soon', platform: 'Digital (Apple TV, Amazon)',    estimated: false },
  { title: 'Mortal Kombat II',           date: '2026-06-09', type: 'film-soon', platform: 'Digital (Warner Bros.)',        estimated: true  },
  { title: 'Deep Water',                 date: '2026-06-16', type: 'film-soon', platform: 'Digital (Magenta Light)',       estimated: false },
  { title: 'Mandalorian & Grogu',        date: '2026-09-01', type: 'film-soon', platform: 'Disney+',                      estimated: true  },
  // TV Shows
  { title: 'The Boys S5',               date: '2026-04-08', type: 'tv',        platform: 'Prime Video',                   estimated: false },
  { title: 'Spider-Noir S1',            date: '2026-05-27', type: 'tv',        platform: 'Prime Video',                   estimated: false },
];

// Build lookup: date string → [events]
const eventMap = {};
EVENTS.forEach(e => {
  if (!eventMap[e.date]) eventMap[e.date] = [];
  eventMap[e.date].push(e);
});

let currentYear  = TODAY.getFullYear();
let currentMonth = TODAY.getMonth(); // 0-indexed

function pad(n) { return String(n).padStart(2, '0'); }

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('month-label').textContent = `${monthNames[currentMonth]} ${currentYear}`;

  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';

  // Day headers
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    const h = document.createElement('div');
    h.className = 'day-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstDay = new Date(currentYear, currentMonth, 1);
  // Monday-based: getDay() returns 0=Sun, shift so Mon=0
  let startOffset = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  // Empty cells before first day
  for (let i = 0; i < startOffset; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const dateStr = `${currentYear}-${pad(currentMonth + 1)}-${pad(d)}`;
    const cellDate = new Date(currentYear, currentMonth, d);

    cell.className = 'day-cell';
    if (cellDate.getTime() === TODAY.getTime()) cell.classList.add('today');

    const num = document.createElement('div');
    num.className = 'day-number';
    num.textContent = d;
    cell.appendChild(num);

    if (eventMap[dateStr]) {
      eventMap[dateStr].forEach(ev => {
        const span = document.createElement('span');
        span.className = `event event-${ev.type}${ev.estimated ? ' event-estimated' : ''}`;
        span.textContent = (ev.estimated ? '~' : '') + ev.title;
        span.title = `${ev.title} · ${ev.platform}${ev.estimated ? ' (estimated)' : ''}`;
        cell.appendChild(span);
      });
    }

    grid.appendChild(cell);
  }

  renderUpcoming();
}

function renderUpcoming() {
  const list = document.getElementById('upcoming-list');
  list.innerHTML = '';

  const sorted = [...EVENTS].sort((a, b) => a.date.localeCompare(b.date));

  sorted.forEach(ev => {
    const d = new Date(ev.date + 'T00:00:00');
    const isPast = d < TODAY;
    const item = document.createElement('div');
    item.className = 'upcoming-item';

    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const monthShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    item.innerHTML = `
      <div class="upcoming-date-badge ${isPast ? 'past' : ''}">
        ${dayNames[d.getDay()]}<br>${d.getDate()} ${monthShort[d.getMonth()]}
      </div>
      <div>
        <div class="upcoming-title">
          ${ev.estimated ? '~' : ''}${ev.title}
          ${ev.type === 'tv' ? '<span class="tv-badge">TV</span>' : ''}
          ${ev.estimated ? '<span style="font-size:0.65rem;color:#6b7280;font-weight:400"> · estimated</span>' : ''}
        </div>
        <div class="upcoming-platform">${ev.platform}</div>
      </div>
    `;
    list.appendChild(item);
  });
}

renderCalendar();
</script>
</body>
</html>
