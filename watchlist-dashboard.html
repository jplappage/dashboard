    header::after { content: none; }

    .header-left {
      position: relative;
      z-index: 1;
    }

    .header-left h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffe81f 0%, #fff7a0 50%, #ffe81f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      text-shadow: none;
    }

    .header-left p {
      font-size: 0.82rem;
      color: #888888;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot-out { background: #22c55e; }
    .dot-soon { background: #f59e0b; }
    .dot-unknown { background: #6b7280; }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      background: #000000;
      border-bottom: 1px solid rgba(255,232,31,0.2);
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid #333;
      background: transparent;
      color: #888888;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .filter-btn:hover, .filter-btn.active {
      background: #ffe81f;
      border-color: #ffe81f;
      color: #000;
    }

    .section {
      padding: 24px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,232,31,0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }

    .card {
      background: #000000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,232,31,0.25);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #ffe81f;
      box-shadow: 0 8px 32px rgba(255,232,31,0.25);
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .plex-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      z-index: 10;
      background: rgba(30,30,30,0.85);
      border-radius: 6px;
      padding: 4px;
      display: flex;
      align-items: center;
      text-decoration: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover .plex-btn {
      opacity: 1;
    }
    .plex-btn svg {
      display: block;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,232,31,0.08);
      opacity: 0;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .card-overlay-text {
      background: #ffe81f;
      color: #000;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.5px;
    }

    .poster-wrap {
      position: relative;
      aspect-ratio: 2/3;
      background: #000000;
      overflow: hidden;
    }

    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .poster-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #000000, #000000);
      font-size: 2rem;
    }

    .badge {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-out {
      background: #166534;
      color: #4ade80;
      border: 1px solid #22c55e40;
    }

    .badge-soon {
      background: #78350f;
      color: #fbbf24;
      border: 1px solid #f59e0b40;
    }

    .badge-unknown {
      background: #450a0a;
      color: #f87171;
      border: 1px solid #ef444440;
    }

    .badge-waiting {
      background: #1c1a10;
      color: #fbbf24;
      border: 1px solid #f59e0b40;
    }

    .badge-notout {
      background: #141418;
      color: #6b7280;
      border: 1px solid #6b728040;
    }

    .imdb-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.75);
      color: #f5c518;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 3px 6px;
      border-radius: 5px;
      backdrop-filter: blur(4px);
      letter-spacing: 0.3px;
      line-height: 1;
      pointer-events: none;
    }

    .card-body {
      padding: 10px;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
      color: #e8e8f0;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-year {
      font-size: 0.7rem;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .card-date {
      font-size: 0.72rem;
      font-weight: 500;
    }

    .date-out { color: #4ade80; }
    .date-soon { color: #fbbf24; }
    .date-unknown { color: #f87171; }

    .date-platform {
      font-size: 0.65rem;
      color: #6b7280;
      margin-top: 2px;
    }

    .date-estimated {
      font-size: 0.62rem;
      color: #6b7280;
      font-style: italic;
    }

    .badge-tv {
      background: #252525;
      color: #aaaaaa;
      border: 1px solid rgba(85,85,85,0.25);
    }

    .tv-divider {
      margin: 8px 24px 0;
      border: none;
      border-top: 1px solid #333;

// Parse YYYY-MM-DD in local time (avoids UTC-midnight timezone shift)
function parseLocalDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getStatus(film) {
  if (!film.vodDate || film.estimated) return film.imdbRating ? 'waiting' : 'notout';
  return parseLocalDate(film.vodDate) <= TODAY ? 'out' : 'soon';
}

function formatDate(dateStr) {
  if (!dateStr) return '??';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function plexUrl(film) {
  return `https://watch.plex.tv/en-GB/movie/${film.plexSlug || film.slug}`;
}

let statusFilter = 'all';

function setStatusFilter(val, btn) {
  statusFilter = val;
  document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFilms();
}

function renderFilms() {
  const container = document.getElementById('film-container');

  const groups = {
    out:     FILMS.filter(f => getStatus(f) === 'out').sort((a, b) => new Date(a.vodDate) - new Date(b.vodDate)),
    soon:    FILMS.filter(f => getStatus(f) === 'soon').sort((a, b) => new Date(a.vodDate) - new Date(b.vodDate)),
    waiting: FILMS.filter(f => getStatus(f) === 'waiting').sort((a, b) => {
      if (!a.vodDate && !b.vodDate) return 0;
      if (!a.vodDate) return 1;
      if (!b.vodDate) return -1;
      return new Date(a.vodDate) - new Date(b.vodDate);
    }),
    notout:  FILMS.filter(f => getStatus(f) === 'notout').sort((a, b) => {
      if (!a.vodDate && !b.vodDate) return 0;
      if (!a.vodDate) return 1;
      if (!b.vodDate) return -1;
      return new Date(a.vodDate) - new Date(b.vodDate);
    }),
  };

  const elOut = document.getElementById('count-out'); if (elOut) elOut.textContent = groups.out.length;
  const elSoon = document.getElementById('count-soon'); if (elSoon) elSoon.textContent = groups.soon.length;

  let html = '';

  const renderSection = (title, items, sectionId) => {
    if (items.length === 0) return '';
    if (statusFilter !== 'all' && statusFilter !== sectionId) return '';
    return `
      <div class="section-title">${title}</div>
      <div class="grid" style="margin-bottom:32px">
        ${items.map(item => renderCard(item)).join('')}
      </div>
    `;
  };

  html += renderSection('✅ Available Now on VOD / Streaming', groups.out, 'out');
  html += renderSection('<span style="color:#f59e0b">▶</span> Coming Soon', groups.soon, 'soon');
  html += renderSection('⏳ Waiting for Streaming Date', groups.waiting, 'waiting');
  html += renderSection('🚫 Not Out Yet', groups.notout, 'notout');

  container.innerHTML = html || '<p style="color:#6b7280;padding:24px">Nothing on the list.</p>';
}


function renderCard(film) {
  const status = getStatus(film);
  const badgeClass = { out: 'badge-out', soon: 'badge-soon', waiting: 'badge-waiting', notout: 'badge-notout' }[status];
  const badgeText = { out: 'Out Now', soon: 'Coming', waiting: '⏳ Waiting', notout: 'Not Out Yet' }[status];
  const dateClass = { out: 'date-out', soon: 'date-soon', waiting: 'date-unknown', notout: 'date-unknown' }[status];
  const dateText = film.estimated
    ? (film.vodDate ? `Stream date ${formatDate(film.vodDate)} TBC` : 'Stream date TBC')
    : (status === 'out' || status === 'soon') ? formatDate(film.vodDate) : 'Stream date TBC';

  const estHtml = '';

  const newBadge = film.isNew ? `<span style="display:inline-block;background:#7c3aed;color:#fff;font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px;vertical-align:middle;">🆕 NEW</span>` : '';

  const imdbBadge = film.imdbRating ? `<span class="imdb-badge">⭐ ${film.imdbRating}</span>` : '';

  const posterHtml = film.poster
    ? `<img src="${film.poster}" alt="${film.title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">`
    : '';

  const lbUrl = `https://letterboxd.com/film/${film.lbSlug || film.slug}/`;
  const plexBtn = (status === 'out' && film.slug) ? `<a href="${plexUrl(film)}" target="_blank" rel="noopener" class="plex-btn" onclick="event.stopPropagation()" title="Watch on Plex"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="12" fill="#1f1f1f"/><path d="M9 5.5 16.5 12 9 18.5V5.5Z" fill="#e5a00d"/></svg></a>` : '';

  return `
    <div class="card" onclick="window.open('${lbUrl}','_blank')" role="link" tabindex="0">
      <div class="poster-wrap">
        ${posterHtml}
        <div class="poster-placeholder" style="${film.poster ? 'display:none' : ''}">🎬</div>
        <span class="badge ${badgeClass}">${badgeText}</span>
        ${imdbBadge}
      </div>
      <div class="card-overlay">
        <span class="card-overlay-text">Letterboxd →</span>
      </div>
      <div class="card-body">
        <div class="card-title">${film.title}${newBadge}</div>
        <div class="card-year">${film.year}</div>
        <div class="card-date ${dateClass}">${dateText}</div>
        ${estHtml}
      </div>
      ${plexBtn}
    </div>
  `;
}

// ── PLATFORM LOGOS ────────────────────────────────────────────────────────
function getPlatformLogo(platform) {
  if (!platform) return '';
  const p = platform.toLowerCase();
  let domain = 'plex.tv';
  if      (p.includes('netflix'))                          domain = 'netflix.com';
  else if (p.includes('disney'))                           domain = 'disneyplus.com';
  else if (p.includes('prime video') || p.includes('amazon prime')) domain = 'primevideo.com';
  else if (p.includes('apple tv'))                         domain = 'tv.apple.com';
  else if (p.includes('hbo') || p.includes('max.com'))    domain = 'max.com';
  else if (p.includes('youtube'))                          domain = 'youtube.com';
  else if (p.includes('plex'))                             domain = 'plex.tv';
  else if (p.includes('paramount'))                        domain = 'paramountplus.com';
  else if (p.includes('peacock'))                          domain = 'peacocktv.com';
  else if (p.includes('hulu'))                             domain = 'hulu.com';
  return `<img src="https://logo.clearbit.com/${domain}" alt="${platform}" title="${platform}" style="height:18px;vertical-align:middle;border-radius:3px;opacity:0.9;" onerror="this.src='https://logo.clearbit.com/plex.tv'">`;
}

// ── CALENDAR ──────────────────────────────────────────────────────────────
let calendarOpen = false;
let calYear  = TODAY.getFullYear();
let calMonth = TODAY.getMonth();

const CAL_EVENTS = (() => {
  const map = {};
  const add = (date, title, cls) => {
    if (!date) return;
    if (!map[date]) map[date] = [];
    map[date].push({ title, cls });
  };
  FILMS.forEach(f => {
    if (!f.vodDate) return;
    const past = parseLocalDate(f.vodDate) <= TODAY;
    add(f.vodDate, f.title, past ? 'cal-film-out' : 'cal-film-soon' + (f.estimated ? ' cal-est' : ''));
  });
  return map;
})();

function toggleCalendar() {
  calendarOpen = !calendarOpen;
  const btn = document.getElementById('cal-toggle-btn');
  document.getElementById('film-container').style.display = calendarOpen ? 'none' : '';
  document.getElementById('calendar-view').style.display  = calendarOpen ? 'block' : 'none';
  document.querySelector('.filter-bar').style.display     = calendarOpen ? 'none' : '';
  btn.textContent = calendarOpen ? '🎬 Back to List' : '📅 Calendar';
  btn.style.background    = calendarOpen ? '#ffe81f' : 'rgba(255,255,255,0.07)';
  btn.style.borderColor   = calendarOpen ? '#ffe81f' : 'rgba(255,255,255,0.15)';
  if (calendarOpen) renderCalendar();
}

function calChangeMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = months[calMonth] + ' ' + calYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-header';
    h.textContent = d;
    grid.appendChild(h);
  });
  const firstDay = new Date(calYear, calMonth, 1);
  const offset   = (firstDay.getDay() + 6) % 7;
  const days     = new Date(calYear, calMonth + 1, 0).getDate();
  for (let i = 0; i < offset; i++) {
    const e = document.createElement('div');
    e.className = 'cal-cell cal-empty';
    grid.appendChild(e);
  }
  for (let d = 1; d <= days; d++) {
    const pad = n => String(n).padStart(2,'0');
    const ds  = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (new Date(calYear,calMonth,d).getTime()===TODAY.getTime() ? ' cal-today' : '');
    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = d;
    cell.appendChild(num);
    (CAL_EVENTS[ds] || []).forEach(ev => {
      const s = document.createElement('span');
      s.className = 'cal-event ' + ev.cls;
      s.textContent = ev.title;
      s.title = ev.title;
      cell.appendChild(s);
    });
    grid.appendChild(cell);
  }
}

renderFilms();
</script>

</body>
</html>
