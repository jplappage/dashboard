<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest-films.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Films">
  <link rel="apple-touch-icon" href="Images/icon-films.png?v=2">
  <title>FILMS WATCHLIST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stars.css">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      background: #000000;
      color: #e8e8f0;
      min-height: 100vh;
    }

    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header {
      background: #000;
      padding: 36px 32px 28px;
      border-bottom: 1px solid rgba(255,232,31,0.35);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    /* Star field */
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: var(--stars-header);
      pointer-events: none;
    }

    .header-left {
      position: relative;
      z-index: 1;
    }

    .header-left h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffe81f 0%, #fff7a0 50%, #ffe81f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      text-shadow: none;
    }

    .header-left p {
      font-size: 0.82rem;
      color: #888888;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      background: #000000;
      border-bottom: 1px solid rgba(255,232,31,0.2);
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid #333;
      background: transparent;
      color: #888888;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .filter-btn:hover, .filter-btn.active {
      background: #ffe81f;
      border-color: #ffe81f;
      color: #000;
    }

    .chip-count {
      display: inline-block;
      min-width: 18px;
      padding: 0 5px;
      border-radius: 100px;
      background: rgba(255,255,255,0.12);
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      vertical-align: 1px;
    }
    .filter-btn:hover .chip-count, .filter-btn.active .chip-count {
      background: rgba(0,0,0,0.18);
    }

    .section {
      padding: 24px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,232,31,0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }

    .card {
      background: #000000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,232,31,0.25);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #ffe81f;
      box-shadow: 0 8px 32px rgba(255,232,31,0.25);
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .plex-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      z-index: 10;
      background: rgba(30,30,30,0.85);
      border-radius: 6px;
      padding: 4px;
      display: flex;
      align-items: center;
      text-decoration: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover .plex-btn {
      opacity: 1;
    }
    .plex-btn svg {
      display: block;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,232,31,0.08);
      opacity: 0;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .card-overlay-text {
      background: #ffe81f;
      color: #000;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.5px;
    }

    .poster-wrap {
      position: relative;
      aspect-ratio: 2/3;
      background: #000000;
      overflow: hidden;
    }

    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .poster-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #000000, #000000);
      font-size: 2rem;
    }

    .imdb-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.75);
      color: #f5c518;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 3px 6px;
      border-radius: 5px;
      backdrop-filter: blur(4px);
      letter-spacing: 0.3px;
      line-height: 1;
      pointer-events: none;
    }

    .card-body {
      padding: 10px;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
      color: #e8e8f0;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-year {
      font-size: 0.7rem;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .card-date {
      font-size: 0.72rem;
      font-weight: 500;
    }

    .date-out { color: #4ade80; }
    .date-soon { color: #fbbf24; }
    .date-unknown { color: #f87171; }

    .last-updated {
      text-align: center;
      padding: 20px;
      font-size: 0.72rem;
      color: #6b7280;
      border-top: 1px solid #222;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      header { padding: 20px 16px 16px; }
      .header-left h1 { font-size: 1.4rem; letter-spacing: 2px; }
      .header-left p { font-size: 0.75rem; }
    }

    /* ── Mobile agenda view for the calendar ── */
    .agenda-row {
      display: flex; gap: 12px; align-items: flex-start;
      background: #000; border: 1px solid rgba(255,232,31,0.25);
      border-radius: 10px; padding: 10px 12px;
    }
    .agenda-row.cal-today { border-color: #ffe81f; background: #1a1800; }
    .agenda-date {
      min-width: 86px; font-size: 0.78rem; font-weight: 600;
      color: #6b7280; padding-top: 2px;
    }
    .agenda-row.cal-today .agenda-date { color: #ffe81f; }
    .agenda-events { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
    .agenda-events .cal-event { margin-bottom: 0; }

    .cal-day-header {
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #6b7280;
      padding: 6px 0;
    }

    .cal-cell {
      background: #000000;
      border: 1px solid rgba(255,232,31,0.25);
      border-radius: 10px;
      min-height: 100px;
      padding: 8px;
    }

    .cal-cell.cal-empty { background: transparent; border-color: transparent; }

    .cal-cell.cal-today { border-color: #ffe81f; background: #1a1800; }

    .cal-day-num {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 5px;
    }

    .cal-cell.cal-today .cal-day-num { color: #ffe81f; }

    .cal-event {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 6px;
      border-radius: 4px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cal-film-out     { background: #166534; color: #4ade80; }
    .cal-film-soon    { background: #78350f; color: #fbbf24; }
    .cal-film-watched { background: #0c2616; color: #52a06e; opacity: 0.85; }
    .cal-tv        { background: #252525; color: #aaaaaa; }
    .cal-est       { opacity: 0.72; }
    .back-arrow {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 14px; border-radius: 100px; border: 1px solid #333;
      color: #ffe81f; text-decoration: none; font-size: 0.8rem;
      transition: all 0.15s; white-space: nowrap;
    }
    .back-arrow:hover { border-color: #ffe81f; background: rgba(255,232,31,0.08); }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 32px; background: #000;
    }
  </style>
</head>
<body>
<div id="pwa-splash"><img src="Images/app-icon-192.png" alt=""></div>
<style>
  #pwa-splash{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;background:#000;transition:opacity .5s ease}
  #pwa-splash img{width:96px;height:96px;filter:drop-shadow(0 0 18px rgba(245,208,32,.55));animation:pwaPulse 1.4s ease-in-out infinite}
  @keyframes pwaPulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.08);opacity:1}}
</style>
<script>
(function(){
  var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone;
  var s = document.getElementById('pwa-splash');
  if(!s) return;
  if(!standalone){ s.remove(); return; }
  s.style.display='flex';
  function hide(){ s.style.opacity='0'; setTimeout(function(){ if(s) s.remove(); }, 550); }
  window.addEventListener('load', function(){ setTimeout(hide, 350); });
  setTimeout(hide, 4000);
})();
</script>


<div class="sticky-top">
<div class="top-bar">
  <a href="index.html" class="back-arrow" title="Back to Dashboard">←</a>
  <span id="sync-status" class="sync-status"></span>
</div>
<header>
  <div class="header-left">
    <h1>FILMS WATCHLIST</h1>
  </div>
<div style="display:flex;align-items:center;gap:14px;position:relative;z-index:1;">
  <a href="https://whentostream.com/category/streaming-film/" target="_blank" rel="noopener" title="Streaming dates via WhenToStream" style="display:inline-flex;align-items:center;">
    <img src="https://i0.wp.com/whentostream.com/wp-content/uploads/2025/09/cropped-WTS_Logo_White_Font3.png" alt="WhenToStream" style="height:30px;width:auto;opacity:0.75;transition:opacity 0.15s ease;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.75">
  </a>
  <button id="cal-toggle-btn" onclick="toggleCalendar()" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#e8e8f0;padding:8px 18px;border-radius:100px;font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.15s ease;" onmouseover="this.style.background='#ffe81f';this.style.borderColor='#ffe81f';this.style.color='#000'" onmouseout="if(!calendarOpen){this.style.background='rgba(255,255,255,0.07)';this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='#e8e8f0'}">📅 Calendar</button>
</div>
</header>

<div class="filter-bar">
  <button class="filter-btn status-btn active" onclick="setStatusFilter('all', this)">📋 ALL <span class="chip-count" id="cnt-all"></span></button>
  <button class="filter-btn status-btn" onclick="setStatusFilter('out', this)">✅ AVAILABLE <span class="chip-count" id="cnt-out"></span></button>
  <button class="filter-btn status-btn" onclick="setStatusFilter('soon', this)"><span style="color:#f59e0b">▶</span> COMING SOON <span class="chip-count" id="cnt-soon"></span></button>
  <button class="filter-btn status-btn" onclick="setStatusFilter('waiting', this)">🎬 IN CINEMAS <span class="chip-count" id="cnt-waiting"></span></button>
  <button class="filter-btn status-btn" onclick="setStatusFilter('notout', this)">🚫 NOT RELEASED <span class="chip-count" id="cnt-notout"></span></button>
</div>

</div>

<div class="section" id="film-container"></div>

<div id="calendar-view" style="display:none; padding:24px; max-width:1100px; margin:0 auto;">

  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;">
    <div style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:#888888;"><span style="width:10px;height:10px;border-radius:3px;background:#166534;display:inline-block"></span> Available</div>
    <div style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:#888888;"><span style="width:10px;height:10px;border-radius:3px;background:#78350f;display:inline-block"></span> Coming Soon</div>
    <div style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:#888888;"><span style="width:10px;height:10px;border-radius:3px;background:#0c2616;display:inline-block"></span> Watched</div>
  </div>

    <button onclick="calChangeMonth(-1)" class="filter-btn">← Prev</button>
    <span id="cal-month-label" style="font-size:1.3rem;font-weight:700;letter-spacing:-0.5px;"></span>
    <button onclick="calChangeMonth(1)" class="filter-btn">Next →</button>
  </div>

  <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;"></div>
</div>

<div class="last-updated">
  Last updated: 19 Jul 2026 (refresh #77) · Auto-deploy active ✓ · Sources: WhenToStream, JustWatch, Wikipedia · <a href="/dashboard/" style="color:#ffe81f;font-size:0.72rem;text-decoration:none;">←</a> · <a href="/dashboard/watchlist.ics" style="color:#ffe81f;font-size:0.72rem;text-decoration:none;" title="Subscribe in Google Calendar">📅 Calendar feed</a>
</div>

<script src="films-data.js"></script>
<script>
const TODAY = (() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); })();

// Parse YYYY-MM-DD in local time (avoids UTC-midnight timezone shift)
function parseLocalDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getStatus(film) {
  if (!film.vodDate || film.estimated) return film.imdbRating ? 'waiting' : 'notout';
  return parseLocalDate(film.vodDate) <= TODAY ? 'out' : 'soon';
}

function formatDate(dateStr) {
  if (!dateStr) return '??';
  const d = parseLocalDate(dateStr);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function plexUrl(film) {
  return `https://watch.plex.tv/en-GB/movie/${film.plexSlug || film.slug}`;
}

let statusFilter = 'all';

function setStatusFilter(val, btn) {
  statusFilter = val;
  document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFilms();
}

function renderFilms() {
  const container = document.getElementById('film-container');

  const groups = {
    out:     FILMS.filter(f => getStatus(f) === 'out').sort((a, b) => new Date(a.vodDate) - new Date(b.vodDate)),
    soon:    FILMS.filter(f => getStatus(f) === 'soon').sort((a, b) => new Date(a.vodDate) - new Date(b.vodDate)),
    waiting: FILMS.filter(f => getStatus(f) === 'waiting').sort((a, b) => {
      if (!a.vodDate && !b.vodDate) return 0;
      if (!a.vodDate) return 1;
      if (!b.vodDate) return -1;
      return new Date(a.vodDate) - new Date(b.vodDate);
    }),
    notout:  FILMS.filter(f => getStatus(f) === 'notout').sort((a, b) => {
      if (!a.vodDate && !b.vodDate) return 0;
      if (!a.vodDate) return 1;
      if (!b.vodDate) return -1;
      return new Date(a.vodDate) - new Date(b.vodDate);
    }),
  };

  document.getElementById('cnt-all').textContent     = FILMS.length;
  document.getElementById('cnt-out').textContent     = groups.out.length;
  document.getElementById('cnt-soon').textContent    = groups.soon.length;
  document.getElementById('cnt-waiting').textContent = groups.waiting.length;
  document.getElementById('cnt-notout').textContent  = groups.notout.length;

  let html = '';

  const renderSection = (title, items, sectionId) => {
    if (items.length === 0) return '';
    if (statusFilter !== 'all' && statusFilter !== sectionId) return '';
    return `
      <div class="section-title">${title}</div>
      <div class="grid" style="margin-bottom:32px">
        ${items.map(item => renderCard(item)).join('')}
      </div>
    `;
  };

  html += renderSection('✅ Available Now on VOD / Streaming', groups.out, 'out');
  html += renderSection('<span style="color:#f59e0b">▶</span> Coming Soon', groups.soon, 'soon');
  html += renderSection('🎬 In Cinemas — Awaiting Stream Date', groups.waiting, 'waiting');
  html += renderSection('🚫 Not Released Yet', groups.notout, 'notout');

  container.innerHTML = html || '<p style="color:#6b7280;padding:24px">Nothing on the list.</p>';
}


function renderCard(film) {
  const status = getStatus(film);
  const dateClass = { out: 'date-out', soon: 'date-soon', waiting: 'date-unknown', notout: 'date-unknown' }[status];
  function getEstText(f) {
    if (f.vodDate) return `Est. ${formatDate(f.vodDate)}`;
    if (f.note) {
      const m = f.note.match(/est\.\s*([^·(]+)/i);
      if (m) return 'Est. ' + m[1].trim();
      return f.note;
    }
    return 'Stream date TBC';
  }
  const dateText = film.estimated
    ? getEstText(film)
    : (status === 'out' || status === 'soon') ? formatDate(film.vodDate) : 'Stream date TBC';

  const newBadge = film.isNew ? `<span style="display:inline-block;background:#7c3aed;color:#fff;font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px;vertical-align:middle;">🆕 NEW</span>` : '';

  const imdbBadge = film.imdbRating ? `<span class="imdb-badge">⭐ ${film.imdbRating}</span>` : '';

  const posterHtml = film.poster
    ? `<img src="${film.poster}" alt="${film.title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">`
    : '';

  const lbUrl = `https://letterboxd.com/film/${film.lbSlug || film.slug}/`;
  const plexBtn = (status === 'out' && film.slug) ? `<a href="${plexUrl(film)}" target="_blank" rel="noopener" class="plex-btn" onclick="event.stopPropagation()" title="Watch on Plex"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="12" fill="#1f1f1f"/><path d="M9 5.5 16.5 12 9 18.5V5.5Z" fill="#e5a00d"/></svg></a>` : '';

  return `
    <div class="card" onclick="window.open('${lbUrl}','_blank')" role="link" tabindex="0">
      <div class="poster-wrap">
        ${posterHtml}
        <div class="poster-placeholder" style="${film.poster ? 'display:none' : ''}">🎬</div>
        ${imdbBadge}
      </div>
      <div class="card-overlay">
        <span class="card-overlay-text">Letterboxd →</span>
      </div>
      <div class="card-body">
        <div class="card-title">${film.title}${newBadge}</div>
        <div class="card-year">${film.year}</div>
        <div class="card-date ${dateClass}">${dateText}</div>
      </div>
      ${plexBtn}
    </div>
  `;
}

// ── CALENDAR ──────────────────────────────────────────────────────────────
let calendarOpen = false;
let calYear  = TODAY.getFullYear();
let calMonth = TODAY.getMonth();

// FILMS and WATCHED are loaded from films-data.js
const CAL_EVENTS = (() => {
  const map = {};
  const add = (date, title, cls) => {
    if (!date) return;
    if (!map[date]) map[date] = [];
    map[date].push({ title, cls });
  };
  FILMS.forEach(f => {
    if (!f.vodDate) return;
    const past = parseLocalDate(f.vodDate) <= TODAY;
    add(f.vodDate, f.title, past ? 'cal-film-out' : 'cal-film-soon' + (f.estimated ? ' cal-est' : ''));
  });
  WATCHED.forEach(w => add(w.vodDate, '✓ ' + w.title, 'cal-film-watched'));
  return map;
})();

function toggleCalendar() {
  calendarOpen = !calendarOpen;
  const btn = document.getElementById('cal-toggle-btn');
  document.getElementById('film-container').style.display = calendarOpen ? 'none' : '';
  document.getElementById('calendar-view').style.display  = calendarOpen ? 'block' : 'none';
  document.querySelector('.filter-bar').style.display     = calendarOpen ? 'none' : '';
  btn.textContent = calendarOpen ? '🎬 Back to List' : '📅 Calendar';
  btn.style.background    = calendarOpen ? '#ffe81f' : 'rgba(255,255,255,0.07)';
  btn.style.borderColor   = calendarOpen ? '#ffe81f' : 'rgba(255,255,255,0.15)';
  if (calendarOpen) renderCalendar();
}

function calChangeMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = months[calMonth] + ' ' + calYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const mobile = window.matchMedia('(max-width: 600px)').matches;
  grid.style.gridTemplateColumns = mobile ? '1fr' : 'repeat(7,1fr)';
  if (mobile) { renderAgenda(grid); return; }
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-header';
    h.textContent = d;
    grid.appendChild(h);
  });
  const firstDay = new Date(calYear, calMonth, 1);
  const offset   = (firstDay.getDay() + 6) % 7;
  const days     = new Date(calYear, calMonth + 1, 0).getDate();
  for (let i = 0; i < offset; i++) {
    const e = document.createElement('div');
    e.className = 'cal-cell cal-empty';
    grid.appendChild(e);
  }
  for (let d = 1; d <= days; d++) {
    const pad = n => String(n).padStart(2,'0');
    const ds  = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (new Date(calYear,calMonth,d).getTime()===TODAY.getTime() ? ' cal-today' : '');
    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = d;
    cell.appendChild(num);
    (CAL_EVENTS[ds] || []).forEach(ev => {
      const s = document.createElement('span');
      s.className = 'cal-event ' + ev.cls;
      s.textContent = ev.title;
      s.title = ev.title;
      cell.appendChild(s);
    });
    grid.appendChild(cell);
  }
}

function renderAgenda(grid) {
  const pad  = n => String(n).padStart(2,'0');
  const days = new Date(calYear, calMonth + 1, 0).getDate();
  let any = false;
  for (let d = 1; d <= days; d++) {
    const ds  = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const evs = CAL_EVENTS[ds] || [];
    if (!evs.length) continue;
    any = true;
    const row = document.createElement('div');
    row.className = 'agenda-row' + (new Date(calYear,calMonth,d).getTime() === TODAY.getTime() ? ' cal-today' : '');
    const lab = document.createElement('div');
    lab.className = 'agenda-date';
    lab.textContent = new Date(calYear, calMonth, d).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
    row.appendChild(lab);
    const wrap = document.createElement('div');
    wrap.className = 'agenda-events';
    evs.forEach(ev => {
      const s = document.createElement('span');
      s.className = 'cal-event ' + ev.cls;
      s.textContent = ev.title;
      s.title = ev.title;
      wrap.appendChild(s);
    });
    row.appendChild(wrap);
    grid.appendChild(row);
  }
  if (!any) {
    const e = document.createElement('div');
    e.style.cssText = 'color:#6b7280;padding:12px 4px;font-size:0.85rem';
    e.textContent = 'No releases this month.';
    grid.appendChild(e);
  }
}

// Re-render calendar when crossing the mobile breakpoint
window.matchMedia('(max-width: 600px)').addEventListener('change', () => { if (calendarOpen) renderCalendar(); });

renderFilms();
