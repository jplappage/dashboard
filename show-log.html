<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest-showlog.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Show Log">
  <link rel="apple-touch-icon" href="Images/icon-showlog.png?v=2">
  <title>SHOW LOG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stars.css">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      background: #000;
      color: #e8e8f0;
      min-height: 100vh;
    }

    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* ── Header ── */
    header {
      background: #000;
      padding: 36px 32px 28px;
      border-bottom: 1px solid rgba(255,232,31,0.35);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: var(--stars-header);
    }

    .header-left { position: relative; z-index: 1; }
    .header-left h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffe81f 0%, #fff7a0 50%, #ffe81f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }
    .header-left p { font-size: 0.82rem; color: #888; margin-top: 6px; letter-spacing: 0.5px; }

    .back-arrow {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid #333;
      color: #ffe81f;
      text-decoration: none;
      font-size: 0.8rem;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .back-arrow:hover { border-color: #ffe81f; background: rgba(255,232,31,0.08); }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 32px; background: #000;
    }

    .header-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-ongoing   { background: #3b82f6; }
    .dot-ended     { background: #6b7280; }
    .dot-watched   { background: #22c55e; }
    .dot-abandoned { background: #f59e0b; }

    /* ── Sync status ── */
    .sync-status {
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid transparent;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .sync-loading { color: #888;    border-color: #333; }
    .sync-ok      { color: #4ade80; border-color: rgba(74,222,128,0.3); }
    .sync-error   { color: #f87171; border-color: rgba(248,113,113,0.3); }
    .sync-status  { cursor: pointer; }
    .sync-status:hover { opacity: 0.8; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 14px 24px;
      background: #000;
      border-bottom: 1px solid rgba(255,232,31,0.2);
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active { background: #ffe81f; border-color: #ffe81f; color: #000; }
    .filter-btn.active { font-weight: 600; }
    .chip-count {
      display: inline-block;
      min-width: 18px;
      padding: 0 5px;
      border-radius: 100px;
      background: rgba(255,255,255,0.12);
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      vertical-align: 1px;
    }
    .filter-btn:hover .chip-count, .filter-btn.active .chip-count { background: rgba(0,0,0,0.18); }
    .filter-spacer { flex: 1; }
    .clear-btn {
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid #333;
      background: transparent;
      color: #666;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .clear-btn:hover { border-color: #ef4444; color: #ef4444; }

    /* ── Search ── */
    .search-input {
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid #333;
      background: rgba(255,255,255,0.04);
      color: #e8e8f0;
      font-size: 0.8rem;
      width: 200px;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: #555; }
    .search-input:focus { outline: none; border-color: rgba(255,232,31,0.4); }
    @media (max-width: 600px) { .search-input { width: 140px; } }

    /* ── Content ── */
    .content { max-width: 1400px; margin: 0 auto; padding: 24px; }

    .section-head {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #6b7280;
      margin: 28px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-head:first-child { margin-top: 0; }
    .section-head::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,232,31,0.2);
    }
    .section-count {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      color: #ffe81f;
      opacity: 0.7;
    }
    .section-head.awaiting { color: #f59e0b; }
    .section-head.awaiting::after { background: rgba(245,158,11,0.25); }
    .section-head.awaiting .section-count { color: #f59e0b; }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 8px;
    }

    .show-card {
      border-radius: 10px;
      overflow: hidden;
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.07);
      transition: border-color 0.15s, transform 0.15s, opacity 0.2s;
      cursor: default;
    }
    .show-card:hover { border-color: rgba(255,232,31,0.25); transform: translateY(-2px); }

    /* ── Poster ── */
    .poster-wrap {
      position: relative;
      aspect-ratio: 2/3;
      background: #111;
      overflow: hidden;
    }
    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s;
    }
    .show-card:hover .poster-wrap img { transform: scale(1.03); }
    .poster-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: #333;
      background: #0d0d0d;
    }

    /* Status badge on poster */
    .poster-badge {
      position: absolute;
      top: 7px;
      left: 7px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 5px;
    }
    .badge-ongoing   { background: #1e3a5f; color: #60a5fa; border: 1px solid rgba(59,130,246,0.4); }
    .badge-ended     { background: #1a1a1a; color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }
    .badge-cancelled { background: #2d0a0a; color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

    /* Watched overlay tick */
    .watched-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: rgba(34,197,94,0.6);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    /* ── Card body ── */
    .card-body { padding: 9px 9px 10px; }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #e8e8f0;
      line-height: 1.3;
      margin-bottom: 7px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .imdb-link { cursor: pointer; }
    .card-title.imdb-link:hover { color: #ffe81f; text-decoration: underline; }
    .poster-wrap.imdb-link:hover img { transform: scale(1.03); }
    .imdb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,232,31,0.08);
      opacity: 0;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .poster-wrap.imdb-link:hover .imdb-overlay { opacity: 1; }
    .imdb-overlay-text {
      background: #ffe81f;
      color: #000;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.5px;
    }

    /* ── Season pills ── */
    .season-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .season-pill {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px 7px;
      border-radius: 100px;
      border: 1px solid #252525;
      background: rgba(255,255,255,0.03);
      font-size: 0.72rem;
      font-weight: 700;
      color: #4a4a4a;
      cursor: pointer;
      transition: all 0.12s;
      user-select: none;
      white-space: nowrap;
    }
    .season-pill:hover { border-color: #444; color: #888; }

    .season-pill.s-watched {
      background: rgba(34,197,94,0.18);
      border-color: rgba(34,197,94,0.45);
      color: #4ade80;
    }
    .season-pill.s-abandoned {
      background: rgba(239,68,68,0.18);
      border-color: rgba(239,68,68,0.45);
      color: #f87171;
    }

    /* Upcoming / announced season pill */
    .season-pill.s-upcoming {
      background: rgba(255,232,31,0.08);
      border-color: rgba(255,232,31,0.35);
      border-style: dashed;
      color: #ffe81f;
      opacity: 0.85;
      cursor: default;
    }
    .season-pill.s-upcoming:hover { opacity: 1; border-color: rgba(255,232,31,0.6); }

    /* Release note shown under the show title for upcoming seasons */
    .upcoming-note {
      font-size: 0.72rem;
      color: #ffe81f;
      opacity: 0.8;
      margin: -2px 0 5px;
      line-height: 1.2;
    }

    /* ── Show-watched toggle ── */
    .btn-show-watched {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin: 14px 0 4px;
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid rgba(255,232,31,0.3);
      background: transparent;
      color: #ffe81f;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .btn-show-watched:hover { background: rgba(255,232,31,0.1); border-color: #ffe81f; }
    .btn-show-watched.showing { background: rgba(255,232,31,0.12); border-color: #ffe81f; }

    .watched-grid-wrap {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease;
      max-height: 0;
      opacity: 0;
    }
    .watched-grid-wrap.open { max-height: 9999px; opacity: 1; }

    /* Empty */
    .empty { text-align: center; padding: 48px 24px; color: #6b7280; font-size: 0.9rem; }

    /* Footer */
    footer {
      text-align: center;
      padding: 32px;
      font-size: 0.75rem;
      color: #444;
      border-top: 1px solid rgba(255,232,31,0.1);
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      header { padding: 24px 16px 20px; }
      .header-left h1 { font-size: 1.4rem; }
      .content { padding: 12px; }
      .filter-bar { padding: 10px 12px; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
    }
  </style>
</head>
<body>

<div class="sticky-top">
<div class="top-bar">
  <a href="index.html" class="back-arrow" title="Back to Dashboard">←</a>
  <span id="sync-status" class="sync-status" title="Tap to re-sync" onclick="loadFromCloud().then(()=>render())"></span>
</div>
<header>
  <div class="header-left">
    <h1>Show Log</h1>
    <p id="header-sub">Track your TV watching</p>
  </div>
  <div class="header-stats" id="header-stats"></div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('watchlist', this)">📺 WATCHLIST</button>
  <button class="filter-btn" onclick="setFilter('coming-soon', this)">⏳ COMING SOON</button>
  <button class="filter-btn" onclick="setFilter('archive', this)">📦 ARCHIVE</button>
  <input type="search" id="search-input" class="search-input" placeholder="Search shows…" oninput="setSearch(this.value)">
  <div class="filter-spacer"></div>
  <button class="clear-btn" onclick="clearAll()">Clear all marks</button>
</div>
</div>

<div class="content" id="content"></div>
<footer id="footer"></footer>

<script src="shows-data.js"></script>
<script>
// ── JSONBin sync ─────────────────────────────────────────────────────────────
const GIST_ID      = '5411ac8d12fdc31aa3fa73e4d66f6377';
const GIST_KEY     = (()=>{let t=localStorage.getItem('gistToken')||'';if(location.hash==='#token'){const v=prompt('Paste GitHub gist token (stored only in this browser):',t);if(v!==null){t=v.trim();localStorage.setItem('gistToken',t);}history.replaceState(null,'',location.pathname+location.search);}return t;})();
window.addEventListener('hashchange',()=>{if(location.hash==='#token'){const v=prompt('Paste GitHub gist token (stored only in this browser):',localStorage.getItem('gistToken')||'');history.replaceState(null,'',location.pathname+location.search);if(v!==null){localStorage.setItem('gistToken',v.trim());location.reload();}}});
document.addEventListener('click',e=>{if(e.target.closest('#sync-status')&&!localStorage.getItem('gistToken')){const v=prompt('Paste GitHub gist token (stored only in this browser):','');if(v!==null&&v.trim()){localStorage.setItem('gistToken',v.trim());location.reload();}}});
const GIST_URL     = `https://api.github.com/gists/${GIST_ID}`;
const GIST_FILE    = 'watchlist.json';
const GIST_HEADERS = { 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json', ...(GIST_KEY ? { 'Authorization': `token ${GIST_KEY}` } : {}) };
const LOCAL_KEY = 'show-log-v2';
const LAST_UPDATED = '16 Jul 2026 15:32';
const THUMB_KEY = 'show-log-thumbs-v3';

let marks      = {};
let thumbCache = {};
let binCache   = null;
let syncDirty  = false;
let syncTimer  = null;
let currentFilter  = 'watchlist';
let searchQuery    = '';

function setSearch(val) {
  searchQuery = val.trim().toLowerCase();
  render();
}

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = { loading:'⟳ Syncing…', ok:'✓ Synced', error:'⚠ Offline' }[state] || '';
  el.className   = 'sync-status sync-' + state;
}

async function loadFromCloud() {
  setSyncStatus('loading');
  try {
    const r = await fetch(GIST_URL, { headers: GIST_HEADERS, cache: 'no-store' });
    if (!r.ok) throw new Error();
    const data = await r.json();
    binCache = JSON.parse(data.files[GIST_FILE]?.content || '{}');
    const cloud = binCache.showLog;
    if (cloud && typeof cloud === 'object' && Object.keys(cloud).length > 0) {
      marks = cloud;
      localStorage.setItem(LOCAL_KEY, JSON.stringify(marks));
    } else {
      const saved = localStorage.getItem(LOCAL_KEY);
      if (saved) marks = JSON.parse(saved);
    }
    setSyncStatus('ok');
  } catch(e) {
    const saved = localStorage.getItem(LOCAL_KEY);
    if (saved) { try { marks = JSON.parse(saved); } catch(_){} }
    setSyncStatus('error');
  }
}

function scheduleSave() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify(marks));
  syncDirty = true;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(saveToCloud, 1500);
}

async function saveToCloud() {
  setSyncStatus('loading');
  try {
    if (!binCache) {
      const r = await fetch(GIST_URL, { headers: GIST_HEADERS, cache: 'no-store' });
      if (r.ok) { const d = await r.json(); binCache = JSON.parse(d.files[GIST_FILE]?.content || '{}'); }
    }
    const updated = { ...binCache, showLog: marks };
    const r = await fetch(GIST_URL, {
      method: 'PATCH',
      headers: GIST_HEADERS,
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(updated) } } })
    });
    if (r.ok) { binCache = updated; syncDirty = false; setSyncStatus('ok'); }
    else setSyncStatus('error');
  } catch(e) { setSyncStatus('error'); }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && syncDirty) {
    clearTimeout(syncTimer);
    saveToCloud();
  }
  // Re-fetch from cloud when the tab becomes visible again (e.g. switching from desktop to mobile)
  if (document.visibilityState === 'visible' && !syncDirty) {
    loadFromCloud().then(() => render());
  }
});

// ── Season marks ─────────────────────────────────────────────────────────────
function getSeasonMark(name, s) {
  const m = marks[name];
  return (m && typeof m === 'object') ? (m['s'+s] || null) : null;
}

function cycleSeasonMark(name, s) {
  if (!marks[name] || typeof marks[name] !== 'object') marks[name] = {};
  const cur = marks[name]['s'+s] || null;
  const nxt = cur === null ? 'w' : cur === 'w' ? 'a' : null;
  if (nxt === null) delete marks[name]['s'+s];
  else marks[name]['s'+s] = nxt;
  if (Object.keys(marks[name]).length === 0) delete marks[name];
  scheduleSave();
  render();
}

function showState(name, aired) {
  if (!aired) return null;
  const vals = Array.from({length:aired}, (_,i) => getSeasonMark(name, i+1));
  if (vals.every(v => v === 'w'))  return 'watched';
  if (vals.some(v => v === 'a'))   return 'abandoned';
  if (vals.some(v => v === 'w'))   return 'partial';
  return null;
}

// ── Filter ───────────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function hasSpecificDate(next) {
  if (!next) return false;
  if (/\best\.?\b/i.test(next)) return false; // estimated = not confirmed, goes to Awaiting
  // Require a specific day + month + year (e.g. "14 Sep 2026"). A month+year
  // alone (e.g. "Oct 2026") is NOT a real date — it goes to Awaiting.
  const m = next.match(/\b(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{4})\b/i);
  if (!m) return false;
  // Reliability rule: a date more than 3 months out isn't dependable yet, so
  // treat it as an estimate (Awaiting). It auto-promotes to Date Announced
  // once it falls within the 3-month window.
  const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const d = new Date(parseInt(m[3]), months[m[2].toLowerCase().slice(0,3)], parseInt(m[1]));
  const cutoff = new Date();
  cutoff.setHours(0,0,0,0);
  cutoff.setMonth(cutoff.getMonth() + 3);
  return d <= cutoff;
}

function showsForFilter() {
  if (searchQuery) return SHOWS.filter(s => s.name.toLowerCase().includes(searchQuery));
  if (currentFilter === 'archive') {
    return SHOWS.filter(s => {
      const state = showState(s.name, s.aired);
      return state === 'abandoned' || (state === 'watched' && s.status !== 'ongoing');
    });
  }
  if (currentFilter === 'coming-soon') {
    return SHOWS.filter(s => s.status === 'ongoing' && (showState(s.name, s.aired) === 'watched' || s.aired === 0));
  }
  // Watchlist: not watched, not abandoned, and already has something out
  // (ongoing+fully-watched and not-yet-released shows both live in coming-soon)
  return SHOWS.filter(s => {
    const state = showState(s.name, s.aired);
    return state !== 'abandoned' && state !== 'watched' && s.aired > 0;
  });
}

function clearAll() {
  if (!confirm('Clear all marks?')) return;
  marks = {};
  localStorage.setItem(LOCAL_KEY, JSON.stringify(marks));
  scheduleSave();
  render();
}

// ── Thumbnails ───────────────────────────────────────────────────────────────
async function loadThumbs() {
  const missing = SHOWS.filter(s => !s.poster && !thumbCache[s.name]);
  for (const show of missing) {
    try {
      const endpoint = show.tvmazeId
        ? `https://api.tvmaze.com/shows/${show.tvmazeId}`
        : show.imdbId
        ? `https://api.tvmaze.com/lookup/shows?imdb=${show.imdbId}`
        : `https://api.tvmaze.com/singlesearch/shows?q=${encodeURIComponent(show.tvmazeQuery || show.name)}`;
      const r = await fetch(endpoint);
      if (r.ok) {
        const d = await r.json();
        const raw = d?.image?.medium || d?.image?.original || null;
        const url = raw ? raw.replace('http://', 'https://') : null;
        if (url) {
          thumbCache[show.name] = url;
          const img = document.getElementById('img-' + cid(show.name));
          const ph  = document.getElementById('ph-'  + cid(show.name));
          if (img) { img.src = url; img.style.display = 'block'; }
          if (ph)  ph.style.display = 'none';
        }
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 60));
  }
  localStorage.setItem(THUMB_KEY, JSON.stringify(thumbCache));
}

function applyThumbs() {
  for (const [name, url] of Object.entries(thumbCache)) {
    const img = document.getElementById('img-' + cid(name));
    const ph  = document.getElementById('ph-'  + cid(name));
    if (img) { img.src = url; img.style.display = 'block'; }
    if (ph)  ph.style.display = 'none';
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
// Unified layout: still-airing active shows, then ended-but-unwatched shows,
// then awaiting, then collapsible watched/abandoned drawers. All sorted A–Z.
function buildMainSection(shows) {
  const alpha = (a, b) => a.name.localeCompare(b.name);

  const activeOngoing = shows.filter(s => s.status === 'ongoing'  && !['watched','abandoned'].includes(showState(s.name, s.aired))).sort(alpha);
  const activeEnded   = shows.filter(s => s.status !== 'ongoing'  && !['watched','abandoned'].includes(showState(s.name, s.aired))).sort(alpha);

  let html = '';

  if (activeOngoing.length) {
    html += `<div class="section-head">Out Now <span class="section-count">${activeOngoing.length}</span></div>`;
    html += `<div class="card-grid">${activeOngoing.map(buildCard).join('')}</div>`;
  }
  if (activeEnded.length) {
    html += `<div class="section-head">Retro Shows <span class="section-count">${activeEnded.length}</span></div>`;
    html += `<div class="card-grid">${activeEnded.map(buildCard).join('')}</div>`;
  }
  return html;
}


function parseDateFromNext(next) {
  if (!next) return Infinity;
  const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const m = next.match(/(\d+)?\s*(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s*(\d{4})/i);
  if (!m) return Infinity;
  const day = m[1] ? parseInt(m[1]) : 1;
  const month = months[m[2].toLowerCase().slice(0,3)];
  const year = parseInt(m[3]);
  return new Date(year, month, day).getTime();
}

// Best-effort sort key for vague/estimated windows (e.g. "est. early 2027",
// "Fall 2026", "S2 · 2027"). No year (e.g. "unannounced", null) sorts last.
function parseEstDate(next) {
  if (!next) return Infinity;
  const ym = next.match(/\b(20\d{2})\b/);
  if (!ym) return Infinity;
  const year = parseInt(ym[1]);
  const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  let month = 6; // bare year → mid-year
  const mm = next.match(/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\b/i);
  if (mm) month = months[mm[1].toLowerCase()];
  else if (/\bearly\b/i.test(next))        month = 1;
  else if (/\bspring\b/i.test(next))       month = 3;
  else if (/\bsummer\b/i.test(next))       month = 6;
  else if (/\b(fall|autumn)\b/i.test(next))month = 9;
  else if (/\blate\b/i.test(next))         month = 10;
  return new Date(year, month, 1).getTime();
}

function buildComingSoonSection(shows) {
  const alpha = (a, b) => a.name.localeCompare(b.name);
  const byDate = (a, b) => parseDateFromNext(a.next) - parseDateFromNext(b.next);
  const byEstDate = (a, b) => {
    const da = parseEstDate(a.next), db = parseEstDate(b.next);
    return da !== db ? da - db : a.name.localeCompare(b.name);
  };
  const announced = shows.filter(s => hasSpecificDate(s.next)).sort(byDate);
  const awaiting  = shows.filter(s => !hasSpecificDate(s.next)).sort(byEstDate);
  let html = '';
  if (announced.length) {
    html += `<div class="section-head">📅 Date Announced <span class="section-count">${announced.length}</span></div>`;
    html += `<div class="card-grid">${announced.map(buildCard).join('')}</div>`;
  }
  if (awaiting.length) {
    html += `<div class="section-head awaiting">🕐 Awaiting Date <span class="section-count">${awaiting.length}</span></div>`;
    html += `<div class="card-grid">${awaiting.map(buildCard).join('')}</div>`;
  }
  return html;
}

function render() {
  const visible = showsForFilter();
  const el = document.getElementById('content');

  if (!visible.length) {
    el.innerHTML = '<div class="empty">No shows in this category.</div>';
    updateStats(); return;
  }

  let html = '';

  if (searchQuery) {
    // Search: show all matching shows regardless of watch state, sorted A–Z
    const sorted = [...visible].sort((a,b) => a.name.localeCompare(b.name));
    html += `<div class="card-grid">${sorted.map(buildCard).join('')}</div>`;
  } else if (currentFilter === 'coming-soon') {
    html += buildComingSoonSection(visible);
  } else if (currentFilter === 'archive') {
    const sorted = [...visible].sort((a,b) => a.name.localeCompare(b.name));
    html += `<div class="card-grid">${sorted.map(buildCard).join('')}</div>`;
  } else {
    html += buildMainSection(visible);
  }

  el.innerHTML = html;
  applyThumbs();
  updateStats();
  updateFooter();
}

function buildCard(s) {
  const state    = showState(s.name, s.aired);
  const isEnded  = s.status !== 'ongoing';
  const cardCls  = '';
  const badgeCls = s.status === 'ongoing' ? 'badge-ongoing' : s.status === 'cancelled' ? 'badge-cancelled' : 'badge-ended';
  const badgeTxt = s.status === 'ongoing' ? 'Ongoing' : s.status === 'cancelled' ? 'Cancelled' : 'Ended';

  const url = s.poster || thumbCache[s.name];
  const imgHtml = url
    ? `<img id="img-${cid(s.name)}" src="${url}" alt="${s.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : `<img id="img-${cid(s.name)}" src="" alt="" style="display:none">`;

  // Parse upcoming season info — pill shows just the season label, note goes under title
  let upcomingPill = '';
  let upcomingNote = '';
  if (s.next) {
    const sep   = s.next.indexOf(' · ');
    const label = sep >= 0 ? s.next.slice(0, sep) : s.next;
    const date  = sep >= 0 ? s.next.slice(sep + 3) : '';
    upcomingPill = `<span class="season-pill s-upcoming">${label}</span>`;
    upcomingNote = date;
  }

  const pills = Array.from({length: s.aired}, (_, i) => {
    const n  = i + 1;
    const mk = getSeasonMark(s.name, n);
    const cls = mk === 'w' ? 's-watched' : mk === 'a' ? 's-abandoned' : '';
    const ico = mk === 'w' ? '✓' : mk === 'a' ? '✗' : '';
    return `<button class="season-pill ${cls}" onclick="cycleSeasonMark('${esc(s.name)}',${n})" title="S${n}: tap to cycle">S${n}${ico ? ' '+ico : ''}</button>`;
  }).join('') + upcomingPill;

  const imdbUrl = s.imdbId
    ? `https://www.imdb.com/title/${s.imdbId}/`
    : `https://www.imdb.com/find/?q=${encodeURIComponent(s.name)}&s=tt`;
  const imdbOpen = `window.open('${imdbUrl}','_blank','noopener')`;

  return `<div class="show-card ${cardCls}">
    <div class="poster-wrap imdb-link" onclick="${imdbOpen}" title="View “${esc(s.name)}” on IMDb">
      ${imgHtml}
      <div class="poster-placeholder" id="ph-${cid(s.name)}"${url ? ' style="display:none"' : ''}>📺</div>
      <div class="watched-overlay">✓</div>
      <div class="imdb-overlay"><span class="imdb-overlay-text">IMDb →</span></div>
    </div>
    <div class="card-body">
      <div class="card-title imdb-link" onclick="${imdbOpen}" title="View “${esc(s.name)}” on IMDb">${s.name}</div>
      ${upcomingNote ? `<div class="upcoming-note">${upcomingNote}</div>` : ''}
      <div class="season-row">${pills}</div>
    </div>
  </div>`;
}

function updateStats() {
  const watched  = SHOWS.filter(s => s.status !== 'ongoing' && showState(s.name, s.aired) === 'watched').length;
  const abandoned= SHOWS.filter(s => showState(s.name, s.aired) === 'abandoned').length;
  const awaiting = SHOWS.filter(s => s.status === 'ongoing' && showState(s.name, s.aired) === 'watched').length;
  const ongoing  = SHOWS.filter(s => s.status === 'ongoing').length - awaiting;
  const ended    = SHOWS.filter(s => s.status !== 'ongoing').length;
  const partial  = SHOWS.filter(s => showState(s.name, s.aired) === 'partial').length;

  const watching = SHOWS.filter(s => { const st = showState(s.name, s.aired); return st !== 'watched' && st !== 'abandoned'; }).length;
  document.getElementById('header-stats').innerHTML = `
    <div class="stat-pill"><span class="stat-dot dot-ongoing"></span>${watching} watching</div>
    ${awaiting ? `<div class="stat-pill"><span class="stat-dot" style="background:#f59e0b"></span>${awaiting} awaiting</div>` : ''}
    ${watched   ? `<div class="stat-pill"><span class="stat-dot dot-watched"></span>${watched} watched</div>` : ''}
    ${abandoned ? `<div class="stat-pill"><span class="stat-dot dot-abandoned"></span>${abandoned} abandoned</div>` : ''}
  `;
  document.getElementById('header-sub').textContent =
    `${SHOWS.length} shows · ${partial} in progress · ${SHOWS.length - watched - abandoned - partial} untouched`;
}

function updateFooter() {
  const w = SHOWS.filter(s => s.status !== 'ongoing' && showState(s.name, s.aired) === 'watched').length;
  const a = SHOWS.filter(s => showState(s.name, s.aired) === 'abandoned').length;
  document.getElementById('footer').innerHTML =
    (w || a ? `${w} fully watched · ${a} abandoned · ${SHOWS.length - w - a} remaining`
            : `${SHOWS.length} shows total`)
    + ` · Last updated: ${LAST_UPDATED}`
    + ` · <a href="shows.ics" title="Subscribe to season-premiere dates" style="color:#ffe81f;text-decoration:none;">📅 Calendar feed</a>`;
}

function cid(n) { return n.replace(/[^a-z0-9]/gi, '-'); }
function esc(n) { return n.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── Boot ─────────────────────────────────────────────────────────────────────
async function init() {
  // Marks from localStorage
  try { const s = localStorage.getItem(LOCAL_KEY); if (s) marks = JSON.parse(s); } catch(_){}

  // Thumb cache from localStorage — must happen before first render so
  // buildCard can inline URLs directly rather than patching the DOM later
  try {
    const s = localStorage.getItem(THUMB_KEY);
    if (s) {
      const raw = JSON.parse(s);
      thumbCache = Object.fromEntries(
        Object.entries(raw).map(([k, v]) => [k, String(v).replace('http://', 'https://')])
      );
    }
  } catch(_){}

  render();              // thumbCache already populated → images inline from the start
  await loadFromCloud(); // sync marks from cloud
  render();              // re-render with updated marks (thumbCache still populated)
  loadThumbs();          // fetch any missing thumbnails in the background
}

init();
