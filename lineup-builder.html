.flag { font-size: 26px; }
.title h1 { font-size: 16px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
.title .sub { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; }

/* ── TEAM TABS ── */
.team-tabs { display: flex; gap: 6px; }
.ttab {
  background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.75); padding: 7px 16px; border-radius: 10px;
  cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.15s; white-space: nowrap;
  display: flex; align-items: center; gap: 9px;
}
.ttab:hover { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3); }
.ttab.active { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.5); color: #fff; box-shadow: 0 0 0 1px rgba(255,255,255,0.15); }
.ttab-logo { height: 26px; width: auto; display: block; }
.ttab-logo.invert { filter: brightness(0) invert(1); opacity: 0.9; }
.pin-btn { margin-left: 6px; font-size: 12px; line-height: 1; opacity: 0.3; cursor: pointer; transition: transform .15s, opacity .15s, filter .15s; user-select: none; }
.pin-btn:hover { opacity: 0.7; transform: scale(1.25); }
.pin-btn.pinned { opacity: 1; filter: drop-shadow(0 0 3px rgba(255,232,31,0.9)); }

/* ── FORMATION BAR ── */
.fbar { margin-left: auto; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.fbar-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; margin-right: 4px; }
.fbtn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.85); padding: 5px 11px; border-radius: 20px;
  cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.14s;
}
.fbtn:hover { background: rgba(255,255,255,0.18); color: #fff; }
.fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.reset-btn {
  margin-left: 6px; background: transparent; border: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.7); padding: 5px 13px; border-radius: 7px;
  cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.14s;
}
.reset-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.sync-status { font-size: 10px; letter-spacing: 0.5px; padding: 3px 9px; border-radius: 20px; border: 1px solid transparent; white-space: nowrap; }
.sync-loading { color: #888;    border-color: #333; }
.sync-ok      { color: #4ade80; border-color: rgba(74,222,128,0.3); }
.sync-error   { color: #f87171; border-color: rgba(248,113,113,0.3); }

/* ── MAIN ── */
.main { display: flex; flex: 1; padding: 10px 12px; gap: 10px; overflow: hidden; min-height: 0; }

/* ── SIDEBARS ── */
.sidebar {
  flex-shrink: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 0;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.left-sidebar  { width: 390px; }
.right-sidebar { width: 320px; }
.left-sidebar  .player-grid { grid-template-columns: repeat(5, 1fr); }
.right-sidebar .player-grid { grid-template-columns: repeat(4, 1fr); }

/* Section headers */
.sec-hdr {
  display: flex; align-items: center; gap: 7px; padding: 8px 10px;
  font-size: 10.5px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
  border-radius: 7px; border: 1.5px solid transparent; transition: all 0.14s;
  cursor: default; margin-bottom: 6px; flex-shrink: 0;
}
.sec-hdr.squad { background: var(--squad-bg); color: var(--squad-color); border-color: var(--squad-border); }
.sec-hdr.squad.dv { background: var(--squad-bg-dv); border-color: var(--squad-border-dv); color: #fff; }
.sec-hdr.fringe { background: rgba(80,80,80,0.18); color: rgba(255,255,255,0.48); border-color: rgba(255,255,255,0.08); margin-top: 10px; }
.sec-hdr.fringe.dv { background: rgba(80,80,80,0.38); border-color: rgba(255,255,255,0.35); color: #fff; }
.sec-hdr.unavail { background: rgba(160,20,20,0.2); color: rgba(255,120,120,0.85); border-color: rgba(200,40,40,0.3); margin-top: 10px; }
.sec-hdr.away { background: rgba(20,80,160,0.2); color: rgba(100,180,255,0.85); border-color: rgba(40,120,220,0.3); margin-top: 10px; }

.pos-grp { margin-bottom: 0; }
.pos-ttl {
  grid-column: 1 / -1;
  font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.28); padding: 4px 2px 1px;
}

/* ── PLAYER GRID ── */
.player-grid { display: grid; gap: 4px; padding: 2px 2px 6px; }

/* ── PCARD ── */
.pcard {
  display: flex; flex-direction: column; align-items: center;
  border-radius: 8px; padding: 5px 2px 4px; cursor: grab;
  border: 1.5px solid transparent; transition: background 0.13s, border-color 0.13s;
  position: relative;
}
.pcard:active { cursor: grabbing; }
.pcard.squad  { background: var(--pcard-sq-bg); border-color: rgba(255,255,255,0.07); }
.pcard.fringe { background: rgba(70,70,70,0.22); border-color: rgba(255,255,255,0.06); }
.pcard.on-pitch { opacity: 0.22; pointer-events: none; }
.pcard.squad:not(.on-pitch):hover  { background: var(--pcard-sq-hover); border-color: rgba(255,255,255,0.25); }
.pcard.fringe:not(.on-pitch):hover { background: rgba(70,70,70,0.45); border-color: rgba(255,255,255,0.2); }
.pcard.injured   { border-color: #e74c3c !important; box-shadow: 0 0 0 1px rgba(231,76,60,0.5); }
.pcard.suspended { border-color: #f1c40f !important; box-shadow: 0 0 0 1px rgba(241,196,15,0.5); }
/* Gold outline = featured (started or subbed on) in the World Cup so far */
.pcard.played-wc { outline: 2px solid #f0c040; outline-offset: -2px; }
.pcard.played-wc:not(.injured):not(.suspended) { box-shadow: 0 0 8px rgba(240,192,64,0.5); }

/* Card avatar */
.pcard-av {
  width: 68px; height: 68px; border-radius: 50%; overflow: hidden;
  background: rgba(0,0,0,0.3); flex-shrink: 0; margin-bottom: 3px;
  border: 2px solid rgba(255,255,255,0.1);
}
.pcard-img { width: 100%; height: 100%; object-fit: cover; object-position: center 10%; display: block; }

.pcard-name {
  font-size: 9.5px; font-weight: 600; text-align: center; width: 100%;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: rgba(255,255,255,0.88); padding: 0 1px; margin-bottom: 4px;
}

/* Status buttons */
.pcard-overlay { display: flex; flex-direction: row; gap: 2px; justify-content: center; width: 100%; }
.pcard-btn {
  flex: 1; max-width: 26px; height: 21px; border-radius: 4px; cursor: pointer;
  border: 1.5px solid transparent; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.14s; user-select: none;
}
.pcard-btn.inj  { background: rgba(231,76,60,0.15);  border-color: rgba(231,76,60,0.35); }
.pcard-btn.inj:hover  { background: rgba(231,76,60,0.35);  border-color: #e74c3c; }
.pcard-btn.inj.on     { background: #c0392b; border-color: #e74c3c; box-shadow: 0 0 6px rgba(231,76,60,0.7); }
.pcard-btn.sus  { background: rgba(180,20,20,0.12);  border-color: rgba(200,30,30,0.32); }
.pcard-btn.sus:hover  { background: rgba(180,20,20,0.35);  border-color: #c0392b; }
.pcard-btn.sus.on     { background: #7b241c; border-color: #c0392b; box-shadow: 0 0 6px rgba(180,20,20,0.8); }
.pcard-btn.away { background: rgba(52,152,219,0.12); border-color: rgba(52,152,219,0.3); }
.pcard-btn.away:hover { background: rgba(52,152,219,0.32); border-color: #3498db; }
.pcard-btn.away.on    { background: #1a6090; border-color: #3498db; box-shadow: 0 0 6px rgba(52,152,219,0.7); }

/* ── PITCH ── */
.pitch-wrap { flex: 1; display: flex; justify-content: center; align-items: stretch; min-width: 0; }
.pitch {
  position: relative; width: 100%; max-width: 580px;
  background: #2d8b3a; border: 3px solid rgba(255,255,255,0.62); border-radius: 4px; overflow: visible;
}
.pitch::before {
  content: ''; position: absolute; inset: 0; border-radius: 2px; pointer-events: none;
  background: repeating-linear-gradient(180deg,
    rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 55px, transparent 55px, transparent 110px);
}
.pitch-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

/* ── SLOTS ── */
.slot-wrap {
  position: absolute; transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; gap: 3px; z-index: 10;
}
.slot-tag {
  font-size: 10px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase;
  color: rgba(255,255,255,0.9); text-shadow: 0 1px 5px rgba(0,0,0,1);
  background: rgba(0,0,0,0.55); padding: 1px 6px; border-radius: 4px;
}
.slot-circle {
  width: 96px; height: 96px; border-radius: 50%; overflow: hidden;
  border: 2px dashed rgba(255,255,255,0.38); background: rgba(0,0,0,0.14);
  display: flex; align-items: center; justify-content: center;
  position: relative; transition: all 0.17s; cursor: default;
}
.slot-circle:not(.hp):hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.55); }
.slot-circle.hp {
  border: 3px solid rgba(255,255,255,0.85); border-style: solid; cursor: grab;
  box-shadow: 0 4px 18px rgba(0,0,0,0.55);
}
.slot-circle.hp:hover { transform: scale(1.06); }
.slot-circle.hp:active { cursor: grabbing; }
.slot-circle.dv { border: 3px solid #fff; background: rgba(255,255,255,0.22); transform: scale(1.1); }
.slot-circle.inj-ring { box-shadow: 0 0 0 3px #e74c3c, 0 4px 18px rgba(0,0,0,0.5); }
.slot-circle.sus-ring { box-shadow: 0 0 0 3px #f1c40f, 0 4px 18px rgba(0,0,0,0.5); }

.slot-img { width: 100%; height: 100%; object-fit: cover; object-position: center 10%; pointer-events: none; display: block; }
.slot-empty { font-size: 22px; opacity: 0.2; pointer-events: none; }
.slot-badge { position: absolute; bottom: 2px; right: 2px; font-size: 15px; filter: drop-shadow(0 1px 3px rgba(0,0,0,1)); pointer-events: none; }
.slot-name {
  font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap;
  text-shadow: 0 1px 5px rgba(0,0,0,1); background: rgba(0,0,0,0.6);
  padding: 2px 6px; border-radius: 4px; max-width: 88px;
  overflow: hidden; text-overflow: ellipsis; text-align: center;
}

/* ── XI COUNTER ── */
.xi-counter {
  display: flex; align-items: center; gap: 10px; margin-left: 10px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 4px 12px;
}
.xi-counter .xi-label { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }
.xi-counter .xi-num { font-size: 17px; font-weight: 900; color: var(--accent); min-width: 22px; text-align: right; }
.xi-counter .xi-denom { font-size: 12px; color: rgba(255,255,255,0.4); }
.prog-bg { width: 60px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 3px; transition: width 0.3s ease; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  body {
    height: auto;
    min-height: 100vh;
    overflow-y: auto;
  }
  .fbar {
    width: 100%;
    margin-left: 0;
    overflow-x: auto;
    flex-wrap: nowrap;
    padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .fbar::-webkit-scrollbar { display: none; }
  .fbar-label { display: none; }
  .fbtn { flex-shrink: 0; }
  .reset-btn { flex-shrink: 0; }
  .xi-counter { flex-shrink: 0; }
  .main {
    flex-direction: column;
    overflow: visible;
    padding: 8px;
    gap: 8px;
  }
  .sidebar {
    width: 100% !important;
    overflow-y: visible;
  }
  .left-sidebar  .player-grid { grid-template-columns: repeat(5, 1fr); }
  .right-sidebar .player-grid { grid-template-columns: repeat(4, 1fr); }
  .pitch-wrap {
    height: 480px;
    flex: none;
  }
  /* Scale down pitch slots so players don't overlap on narrow screens */
  .slot-circle { width: 54px; height: 54px; }
  .slot-name   { font-size: 9px; max-width: 52px; padding: 1px 4px; }
  .slot-tag    { font-size: 8px; padding: 1px 4px; }
  .slot-badge  { font-size: 11px; }
  .slot-empty  { font-size: 16px; }
}

/* ── TRIBUTE CARD ── */
.tribute-section { margin-top: 12px; padding: 0 2px 6px; }
.tribute-card {
  position: relative; border-radius: 10px; overflow: hidden;
  background: linear-gradient(135deg, #120606 0%, #2a0a0a 60%, #1a0000 100%);
  border: 1.5px solid rgba(200,16,46,0.45);
  padding: 10px 12px 10px 12px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  cursor: default; user-select: none;
}
.tribute-forever {
  position: absolute; top: 8px; left: 10px;
  background: #111; color: #fff; font-size: 8.5px; font-weight: 900;
  letter-spacing: 2.5px; padding: 3px 9px; border-radius: 20px;
  text-transform: uppercase; border: 1px solid rgba(255,255,255,0.12);
}
.tribute-info { flex: 1; padding-top: 18px; min-width: 0; }
.tribute-jersey {
  font-size: 40px; font-weight: 900; color: rgba(255,255,255,0.13);
  line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -1px;
}
.tribute-name { font-size: 13.5px; font-weight: 700; color: rgba(255,255,255,0.88); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tribute-pos  { font-size: 9.5px; color: rgba(200,16,46,0.85); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
.tribute-photo {
  width: 74px; height: 74px; border-radius: 50%; overflow: hidden;
  border: 2px solid rgba(200,16,46,0.5); background: rgba(0,0,0,0.4);
  flex-shrink: 0; opacity: 0.9;
}
.tribute-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center 10%; display: block; }
.back-arrow {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 14px; border-radius: 100px; border: 1px solid #333;
  color: #ffe81f; text-decoration: none; font-size: 0.8rem;
  transition: all 0.15s; white-space: nowrap;
}
.back-arrow:hover { border-color: #ffe81f; background: rgba(255,232,31,0.08); }
</style>

const POS_GRAD = {
  GK:  ['#7a5200','#c98a00'],
  DEF: ['#0d3a82','#1a6ad4'],
  MID: ['#0d5c2a','#1ca050'],
  ATT: ['#7a1010','#d42020'],
};

function makeSVG(full, pos) {
  const parts = full.trim().split(/\s+/);
  const ini = (parts.length > 1)
    ? parts[0][0].toUpperCase() + parts[parts.length-1][0].toUpperCase()
    : parts[0].slice(0,2).toUpperCase();
  const [c1, c2] = POS_GRAD[pos] || ['#002395','#1a5cb3'];
  return 'data:image/svg+xml,' + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/>
      </linearGradient></defs>
      <rect width="80" height="80" fill="url(#g)"/>
      <text x="40" y="38" font-family="Arial,sans-serif" font-size="30" font-weight="900"
            fill="white" text-anchor="middle" dominant-baseline="middle">${ini}</text>
      <rect x="0" y="58" width="80" height="22" fill="rgba(0,0,0,0.45)"/>
      <text x="40" y="73" font-family="Arial,sans-serif" font-size="11" font-weight="700"
            fill="rgba(255,255,255,0.85)" text-anchor="middle">${pos}</text>
    </svg>`
  );
}

function loadImg(el, sfId, tmImg, full, pos, lfcImg) {
  const svgSrc = makeSVG(full, pos);
  const sources = [];
  if (lfcImg) sources.push(lfcImg);
  if (tmImg) {
    const raw = `img.a.transfermarkt.technology/portrait/medium/${tmImg}`;
    sources.push(`https://images.weserv.nl/?url=${encodeURIComponent(raw)}&w=220&fit=cover&a=top&output=jpg`);
    sources.push(`https://img.a.transfermarkt.technology/portrait/medium/${tmImg}`);
  }
  if (sfId) {
    sources.push(`https://cdn.sofifa.net/players/${sfId}/25_120.png`);
    sources.push(`https://cdn.sofifa.net/players/${sfId}/24_120.png`);
  }
  function tryNext(idx) {
    if (idx >= sources.length) { el.src = svgSrc; el.onerror = null; return; }
    el.onerror = () => tryNext(idx + 1);
    el.src = sources[idx];
  }
  if (sources.length) tryNext(0); else el.src = svgSrc;
}

const GIST_URL     = `https://api.github.com/gists/${GIST_ID}`;
const GIST_FILE    = 'watchlist.json';
const BIN_HEADERS  = { 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json', ...(GIST_KEY ? { 'Authorization': `token ${GIST_KEY}` } : {}) };

let binCache  = null;  // full bin record cached in memory
let saveTimer = null;
let syncDirty = false;

function cloudKey(team) { return 'lineup_' + team; }
function saveKey()       { return TEAM_CONFIG[activeTeam].saveKey; }

function currentStateObj() {
  return { f: formation, s: slots, c: conditions,
           ps: Object.fromEntries(PLAYERS.map(p => [p.id, p.sec])) };
}

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = { loading: '⟳ Syncing…', ok: '✓ Synced', error: '⚠ Offline' }[state] || '';
  el.className = 'sync-status sync-' + state;
}

function applyStateData(s) {
  if (!s) return;
  if (s.f && FORMATIONS[s.f]) {
    formation = s.f;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', b.dataset.f === formation));
  }
  if (s.s) slots = s.s;
  if (s.c) conditions = s.c;
  if (s.ps) PLAYERS.forEach(p => { if (s.ps[p.id]) p.sec = s.ps[p.id]; });
}

async function loadStateFromCloud(teamId) {
  setSyncStatus('loading');
  try {
    const r = await fetch(GIST_URL, { headers: BIN_HEADERS, cache: 'no-store' });
    if (!r.ok) throw new Error();
    binCache = JSON.parse((await r.json()).files[GIST_FILE]?.content || '{}');
    applyStateData(binCache[cloudKey(teamId)]);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    try {
      const raw = localStorage.getItem(TEAM_CONFIG[teamId].saveKey);
      if (raw) applyStateData(JSON.parse(raw));
    } catch(_) {}
  }
}

function saveState() {
  // Always write localStorage immediately
  try { localStorage.setItem(saveKey(), JSON.stringify(currentStateObj())); } catch(e) {}
  syncDirty = true;
  setSyncStatus('loading');
  // Debounce cloud saves — 300ms batches rapid changes (drags etc.)
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      // If binCache is null (cloud load failed at startup), fetch before PUT
      // to avoid overwriting other teams' data with an empty object
      if (!binCache) {
        const gr = await fetch(GIST_URL, { headers: BIN_HEADERS, cache: 'no-store' });
        binCache = gr.ok ? JSON.parse((await gr.json()).files[GIST_FILE]?.content || '{}') : {};
      }
      binCache[cloudKey(activeTeam)] = currentStateObj();
      const r = await fetch(GIST_URL, { method: 'PATCH', headers: BIN_HEADERS, body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(binCache) } } }) });
      if (!r.ok) throw new Error();
      syncDirty = false;
      setSyncStatus('ok');
    } catch(e) {
      setSyncStatus('error');
    }
  }, 300);
}

// Emergency save when page is hidden (mobile home button / app switch)
// Uses fetch keepalive — completes after page closes AND supports auth headers
// (sendBeacon can't set X-Master-Key so JSONBin would reject it with 401)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && syncDirty) {
    clearTimeout(saveTimer);
    const cache = binCache || {};
    cache[cloudKey(activeTeam)] = currentStateObj();
    fetch(GIST_URL, { method: 'PATCH', headers: BIN_HEADERS, body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(cache) } } }), keepalive: true }).catch(() => {});
  }
});

// ════════════════════════════════════════════════════════
//  SWITCH TEAM
// ════════════════════════════════════════════════════════
function switchTeam(teamId) {
  if (teamId === activeTeam) return;

  // 1. Flush old team to binCache immediately — cancel debounce to avoid it
  //    firing later with activeTeam already pointing at the new team (race condition)
  clearTimeout(saveTimer);
  const oldTeam = activeTeam;
  try { localStorage.setItem(TEAM_CONFIG[oldTeam].saveKey, JSON.stringify(currentStateObj())); } catch(e) {}
  if (binCache) binCache[cloudKey(oldTeam)] = currentStateObj();

  // 2. Switch active team
  activeTeam = teamId;
  const cfg = TEAM_CONFIG[teamId];

  // Reset player sections to originals for new team
  cfg.players.forEach(p => p.sec = p._origSec);

  // Set active data to defaults (applyStateData below will override)
  PLAYERS    = cfg.players;
  PM         = Object.fromEntries(PLAYERS.map(p => [p.id, p]));
  formation  = cfg.defaultFormation;
  slots      = {};
  conditions = {};

  // Apply CSS variables
  const root = document.documentElement;
  Object.entries(cfg.css).forEach(([k, v]) => root.style.setProperty(k, v));

  // Update header text
  document.getElementById('teamFlag').innerHTML = cfg.logoHtml;
  document.getElementById('teamName').textContent = cfg.name;
  document.getElementById('teamSub').textContent = cfg.sub;

  // Update tab active state
  document.querySelectorAll('.ttab').forEach(t => t.classList.toggle('active', t.dataset.team === teamId));

  // Formation buttons back to default (applyStateData will correct if saved)
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', b.dataset.f === formation));

  // 3. Apply new team state from binCache (already up to date from page load)
  //    Avoids a cloud round-trip and the race condition caused by loadStateFromCloud
  if (binCache && binCache[cloudKey(teamId)]) {
    applyStateData(binCache[cloudKey(teamId)]);
  } else {
    // binCache null or team not in it — fall back to localStorage
    try {
      const raw = localStorage.getItem(cfg.saveKey);
      if (raw) applyStateData(JSON.parse(raw));
    } catch(_) {}
  }
  renderOnly();

  // 4. Push the updated binCache (contains both teams' latest state) to cloud once
  if (binCache) {
    setSyncStatus('loading');
    fetch(GIST_URL, { method: 'PATCH', headers: BIN_HEADERS, body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(binCache) } } }) })
      .then(r => { if (r.ok) { syncDirty = false; setSyncStatus('ok'); } else throw new Error(); })
      .catch(() => setSyncStatus('error'));
  }
}

// France players who have featured (started or come on as a sub) in the
// 3 group games so far — France 2-0 Senegal, France 3-1 Iraq, Norway 0-? France.
// Source: ESPN match lineups (events 760432 / 760457 / 760475), 26 Jun 2026.
const PLAYED_WC = new Set([
  'maignan','saliba','upamecano','thernandez','kounde','konate','digne','gusto','lacroix',
  'tchouameni','rabiot','kone','dembele','mbappe','doue','olise','barcola','thuram',
  'cherki','mateta','akliouche'
]);

// ════════════════════════════════════════════════════════
//  BUILD CARD
// ════════════════════════════════════════════════════════
function buildPill(p, onPitch, isUnavail = false) {
  const cond = conditions[p.id] || null;
  const div = document.createElement('div');
  div.className = ['pcard', p.sec, onPitch?'on-pitch':'', isUnavail?'unavail-card':'',
    cond==='injured'?'injured':'', cond==='suspended'?'suspended':'',
    PLAYED_WC.has(p.id)?'played-wc':''].filter(Boolean).join(' ');
  div.dataset.pid = p.id;

  const av = document.createElement('div'); av.className = 'pcard-av';
  const img = document.createElement('img'); img.className = 'pcard-img';
  loadImg(img, p.sfId, p.tmImg, p.full, p.pos, p.lfcImg||null);
  av.appendChild(img);

  const nm = document.createElement('div'); nm.className = 'pcard-name'; nm.textContent = p.name;

  const overlay = document.createElement('div'); overlay.className = 'pcard-overlay';
  const injB  = document.createElement('div'); injB.className  = 'pcard-btn inj'  + (cond==='injured'   ?' on':''); injB.title  = 'Injured';   injB.textContent  = '✚';
  const susB  = document.createElement('div'); susB.className  = 'pcard-btn sus'  + (cond==='suspended' ?' on':''); susB.title  = 'Suspended'; susB.textContent  = '■';
  const awayB = document.createElement('div'); awayB.className = 'pcard-btn away' + (cond==='away'      ?' on':''); awayB.title = 'Away';      awayB.textContent = '✈';
  injB.addEventListener('click',  e => { e.stopPropagation(); toggleCond(p.id,'injured');   });
  susB.addEventListener('click',  e => { e.stopPropagation(); toggleCond(p.id,'suspended'); });
  awayB.addEventListener('click', e => { e.stopPropagation(); toggleCond(p.id,'away');      });
  overlay.append(injB, susB, awayB);

  div.append(av, nm, overlay);
  div.draggable = !onPitch && !isUnavail;

  if (!onPitch && !isUnavail) {
    div.addEventListener('dragstart', e => {
      dragPid  = p.id; dragFrom = p.sec + '-pool';
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => div.style.opacity = '0.35');
    });
    div.addEventListener('dragend', () => { div.style.opacity = ''; });
  }
  return div;
}

// ════════════════════════════════════════════════════════
//  TRIBUTE CARD  (Diogo Jota — Liverpool only)

// ════════════════════════════════════════════════════════
//  RENDER SIDEBAR
// ════════════════════════════════════════════════════════
function renderSidebar() {
  const assigned   = new Set(Object.values(slots));
  const ORDER      = ['GK','DEF','MID','ATT'];
  const unavailIds = new Set(
    Object.entries(conditions)
      .filter(([,v]) => v === 'injured' || v === 'suspended' || v === 'away')
      .map(([k]) => k)
  );

  ['squad','fringe'].forEach(sec => {
    const cont = document.getElementById(sec + '-pool');
    cont.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'player-grid';
    ORDER.forEach(pos => {
      const grp = PLAYERS.filter(p => p.sec === sec && p.pos === pos && !unavailIds.has(p.id));
      if (!grp.length) return;
      const lbl = document.createElement('div'); lbl.className = 'pos-ttl';
      lbl.style.gridColumn = '1 / -1'; lbl.textContent = pos;
      grid.appendChild(lbl);
      grp.forEach(p => grid.appendChild(buildPill(p, assigned.has(p.id))));
    });
    cont.appendChild(grid);
  });

  function renderSpecialSection(hdrId, poolId, players) {
    const hdr = document.getElementById(hdrId);
    const pool = document.getElementById(poolId);
    if (players.length) {
      hdr.style.display = 'flex'; pool.style.display = 'block'; pool.innerHTML = '';
      const grid = document.createElement('div'); grid.className = 'player-grid';
      players.forEach(p => grid.appendChild(buildPill(p, false, true)));
      pool.appendChild(grid);
    } else {
      hdr.style.display = 'none'; pool.style.display = 'none';
    }
  }

  const unavailPlayers = PLAYERS.filter(p => { const c = conditions[p.id]; return c==='injured'||c==='suspended'||c==='away'; });
  renderSpecialSection('unavailHdr', 'unavail-pool', unavailPlayers);

  // Tribute card — Liverpool only
  const tributeSection = document.getElementById('tribute-section');
  if (activeTeam === 'liverpool') {
    tributeSection.style.display = 'block';
    tributeSection.innerHTML = '';
    tributeSection.appendChild(buildTributeCard());
  } else {
    tributeSection.style.display = 'none';
  }
}

// ════════════════════════════════════════════════════════
//  PITCH LINES
// ════════════════════════════════════════════════════════
function drawLines() {
  const pitch = document.getElementById('pitch');
  const W = pitch.clientWidth, H = pitch.clientHeight;
  if (!W || !H) return;
  const mx = 10, my = 10;
  const iw = W - mx*2, ih = H - my*2;
  const paW = iw*0.55, paH = ih*0.155, paX = mx+(iw-paW)/2;
  const gaW = iw*0.28, gaH = ih*0.07,  gaX = mx+(iw-gaW)/2;
  const cx = W/2, cy = H/2, cr = Math.min(iw,ih)*0.085;
  const svg = document.getElementById('pitchSvg');
  const ns = 'http://www.w3.org/2000/svg';
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  function r(x,y,w,h) {
    const el = document.createElementNS(ns,'rect');
    el.setAttribute('x',x); el.setAttribute('y',y); el.setAttribute('width',w); el.setAttribute('height',h);
    el.setAttribute('fill','none'); el.setAttribute('stroke','rgba(255,255,255,0.42)'); el.setAttribute('stroke-width','1.8');
    svg.appendChild(el);
  }
  function l(x1,y1,x2,y2) {
    const el = document.createElementNS(ns,'line');
    el.setAttribute('x1',x1); el.setAttribute('y1',y1); el.setAttribute('x2',x2); el.setAttribute('y2',y2);
    el.setAttribute('stroke','rgba(255,255,255,0.42)'); el.setAttribute('stroke-width','1.8');
    svg.appendChild(el);
  }
  function c(cx,cy,radius,filled) {
    const el = document.createElementNS(ns,'circle');
    el.setAttribute('cx',cx); el.setAttribute('cy',cy); el.setAttribute('r',radius);
    el.setAttribute('fill',filled?'rgba(255,255,255,0.42)':'none');
    el.setAttribute('stroke','rgba(255,255,255,0.42)'); el.setAttribute('stroke-width','1.8');
    svg.appendChild(el);
  }
  r(mx,my,iw,ih); l(mx,cy,mx+iw,cy); c(cx,cy,cr,false); c(cx,cy,3,true);
  r(paX,my,paW,paH); r(gaX,my,gaW,gaH); c(cx,my+paH,3,true);
  r(paX,my+ih-paH,paW,paH); r(gaX,my+ih-gaH,gaW,gaH); c(cx,my+ih-paH,3,true);
}

// ════════════════════════════════════════════════════════
//  RENDER PITCH SLOTS
// ════════════════════════════════════════════════════════
function renderPitch() {
  const pitch = document.getElementById('pitch');
  pitch.querySelectorAll('.slot-wrap').forEach(s => s.remove());
  drawLines();

  FORMATIONS[formation].forEach(sd => {
    const wrap = document.createElement('div'); wrap.className = 'slot-wrap';
    wrap.style.left = sd.x + '%'; wrap.style.top = sd.y + '%';
    const tag = document.createElement('div'); tag.className = 'slot-tag'; tag.textContent = sd.l;
    const circle = document.createElement('div'); circle.className = 'slot-circle'; circle.dataset.slotId = sd.id;
    const pid = slots[sd.id];
    const cond = pid ? (conditions[pid] || null) : null;

    if (pid) {
      const player = PM[pid];
      if (!player) { delete slots[sd.id]; }
      else {
        circle.classList.add('hp');
        if (cond==='injured')   circle.classList.add('inj-ring');
        if (cond==='suspended') circle.classList.add('sus-ring');
        circle.draggable = true;
        const img = document.createElement('img'); img.className = 'slot-img';
        loadImg(img, player.sfId, player.tmImg, player.full, player.pos, player.lfcImg||null);
        circle.appendChild(img);
        if (cond) {
          const b = document.createElement('div'); b.className = 'slot-badge';
          b.textContent = cond==='injured' ? '🤕' : '🟡';
          circle.appendChild(b);
        }
        const nm = document.createElement('div'); nm.className = 'slot-name'; nm.textContent = player.name;
        wrap.append(tag, circle, nm);
        circle.addEventListener('click', () => { delete slots[sd.id]; refresh(); });
        circle.addEventListener('dragstart', e => {
          dragPid = pid; dragFrom = sd.id; e.dataTransfer.effectAllowed = 'move';
          requestAnimationFrame(() => circle.style.opacity = '0.25');
        });
        circle.addEventListener('dragend', () => { circle.style.opacity = ''; });
      }
    }

    if (!pid || !PM[pid]) {
      const ei = document.createElement('div'); ei.className = 'slot-empty'; ei.textContent = '+';
      circle.appendChild(ei);
      wrap.append(tag, circle);
    }

    circle.addEventListener('dragover',  e => { e.preventDefault(); circle.classList.add('dv'); });
    circle.addEventListener('dragleave', () => circle.classList.remove('dv'));
    circle.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation(); circle.classList.remove('dv'); dropOnSlot(sd.id);
    });
    pitch.appendChild(wrap);
  });
}

// ════════════════════════════════════════════════════════
//  DROP HANDLERS
// ════════════════════════════════════════════════════════
function dropOnSlot(targetId) {
  if (!dragPid) return;
  const existing = slots[targetId];
  const fromSlot = dragFrom && dragFrom !== 'squad-pool' && dragFrom !== 'fringe-pool';
  if (fromSlot && dragFrom !== targetId) {
    if (existing) slots[dragFrom] = existing; else delete slots[dragFrom];
  }
  slots[targetId] = dragPid;
  dragPid = null; dragFrom = null; refresh();
}
function onDropSidebar(e) {
  if (dragPid && dragFrom && dragFrom !== 'squad-pool' && dragFrom !== 'fringe-pool') delete slots[dragFrom];
  dragPid = null; dragFrom = null; refresh();
}
function onDropPitchBg(e) { dragPid = null; dragFrom = null; }
function hdrOver(e, sec) {
  e.preventDefault();
  document.getElementById(sec==='squad'?'squadHdr':'fringeHdr').classList.add('dv');
}
function hdrLeave(sec) {
  document.getElementById(sec==='squad'?'squadHdr':'fringeHdr').classList.remove('dv');
}
function hdrDrop(e, targetSec) {
  e.preventDefault(); e.stopPropagation(); hdrLeave(targetSec);
  if (!dragPid) return;
  const p = PM[dragPid]; if (!p) return;
  if (dragFrom && dragFrom !== 'squad-pool' && dragFrom !== 'fringe-pool') delete slots[dragFrom];
  p.sec = targetSec; dragPid = null; dragFrom = null; refresh();
}

// ════════════════════════════════════════════════════════
//  CONDITION TOGGLE
// ════════════════════════════════════════════════════════
function toggleCond(pid, cond) {
  conditions[pid] = conditions[pid] === cond ? null : cond;
  if (conditions[pid]) {
    for (const [slotId, p] of Object.entries(slots)) {
      if (p === pid) { delete slots[slotId]; break; }
    }
  }
  refresh();
}

// ════════════════════════════════════════════════════════
//  FORMATION / RESET
// ════════════════════════════════════════════════════════
function setFormation(name) {
  formation = name; slots = {};
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', b.dataset.f === name));
  refresh();
}
function reset() {
  slots = {}; conditions = {};
  PLAYERS.forEach(p => p.sec = p._origSec);
  refresh();
}

// ════════════════════════════════════════════════════════
//  HEADER COUNTER
// ════════════════════════════════════════════════════════
function updateInfo() {
  const count = Object.values(slots).filter(v => PM[v]).length;
  document.getElementById('cntNum').textContent = count;
  document.getElementById('progFill').style.width = (count / 11 * 100) + '%';
}

// ════════════════════════════════════════════════════════
//  REFRESH
// ════════════════════════════════════════════════════════
// renderOnly: re-draw without triggering a save (used after load/init)
function renderOnly() { renderPitch(); renderSidebar(); updateInfo(); }
// refresh: re-draw AND persist (used after user-initiated changes)
function refresh() { renderOnly(); saveState(); }
window.addEventListener('resize', () => drawLines());

// ════════════════════════════════════════════════════════
//  DEFAULT TEAM (pin)
// ════════════════════════════════════════════════════════
const DEFAULT_TEAM_KEY = 'lineup_default_team';
function getDefaultTeam() {
  const t = localStorage.getItem(DEFAULT_TEAM_KEY);
  return (t === 'france' || t === 'liverpool') ? t : 'france';
}
function setDefaultTeam(team) {
  if (team !== 'france' && team !== 'liverpool') return;
  localStorage.setItem(DEFAULT_TEAM_KEY, team);
  updatePinUI();
}
function updatePinUI() {
  const d = getDefaultTeam();
  document.querySelectorAll('.pin-btn').forEach(p => {
    const on = p.dataset.pinteam === d;
    p.classList.toggle('pinned', on);
    p.title = on ? 'Opens by default' : 'Pin as default';
  });
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
document.querySelectorAll('.fbtn').forEach(b => b.addEventListener('click', () => setFormation(b.dataset.f)));
document.getElementById('resetBtn').addEventListener('click', reset);
document.querySelectorAll('.ttab').forEach(t => t.addEventListener('click', () => switchTeam(t.dataset.team)));
document.querySelectorAll('.pin-btn').forEach(p => p.addEventListener('click', e => { e.stopPropagation(); setDefaultTeam(p.dataset.pinteam); }));

// Clean up stale save keys from older versions
try { localStorage.removeItem('liverpool_lineup_v1'); } catch(e) {}

// Initialise to the user's pinned default team
const root = document.documentElement;
const bootTeam = getDefaultTeam();
activeTeam = bootTeam;
{
  const cfg = TEAM_CONFIG[bootTeam];
  cfg.players.forEach(p => p.sec = p._origSec);
  PLAYERS   = cfg.players;
  PM        = Object.fromEntries(PLAYERS.map(p => [p.id, p]));
  formation = cfg.defaultFormation;
  document.getElementById('teamFlag').innerHTML = cfg.logoHtml;
  document.getElementById('teamName').textContent = cfg.name;
  document.getElementById('teamSub').textContent = cfg.sub;
  document.querySelectorAll('.ttab').forEach(t => t.classList.toggle('active', t.dataset.team === bootTeam));
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', b.dataset.f === formation));
  Object.entries(cfg.css).forEach(([k,v]) => root.style.setProperty(k,v));
}
updatePinUI();

// Load from cloud then render — renderOnly so init doesn't trigger a save
(async () => {
  await loadStateFromCloud(activeTeam);
  requestAnimationFrame(() => renderOnly());
})();
