<script>
(async function retroTeaser() {
  const el = document.getElementById('retro-sub');
  if (!el) return;
  try {
    const html = await (await fetch('retro-watchlist.html')).text();
    const films = [...html.matchAll(/\{id:(\d+),\s*title:"([^"]+)",\s*year:(\d{4})[^}]*?lbRating:([\d.]+)/g)]
      .map(m => ({ id:+m[1], title:m[2], year:+m[3], lb:+m[4] }));
    if (!films.length) return;

    let watched = {};
    try {
      const j = await (await fetch('https://api.github.com/gists/5411ac8d12fdc31aa3fa73e4d66f6377', { cache:'no-store' })).json();
      watched = JSON.parse(j.files['watchlist.json'].content);
    } catch (_) {
      [...html.matchAll(/^\s*(\d+):\s*"\d{4}-\d{2}-\d{2}"/gm)].forEach(m => watched[m[1]] = '1');
    }

    const isWatched = f => typeof watched[f.id] === 'string';
    const done = films.filter(isWatched).length;
    const left = films.filter(f => !isWatched(f));

    const line1 = '<span class="soon">' + done + '/' + films.length + ' watched</span> · ' + left.length + ' to go';
    let line2 = '';
    if (left.length) {
      const seed = +new Date().toISOString().slice(0,10).replace(/-/g,'');
      const pick = left[seed % left.length];
      line2 = "tonight's pick: <span class=\"hot\">" + pick.title + '</span> (' + pick.year + ') · ★' + pick.lb.toFixed(1);
    } else {
      line2 = 'all watched — legend 🏆';
    }
    el.innerHTML = line1 + '<br>' + line2;
  } catch (_) {}
})();
</script>

    const upcoming = SHOWS
      .map(s => {
        const m = s.next && s.next.match(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{4})/);
        if (!m) return null;
        const d = new Date(+m[3], MONTHS[m[2]], +m[1]);
        return ymd(d) > today ? { s, d, iso: ymd(d) } : null;
      })
      .filter(Boolean)
      .sort((a,b) => a.iso.localeCompare(b.iso));

    const fmtUp = u => {
      const days = Math.round((u.d - new Date(today + 'T00:00:00')) / 86400000);
      const season = (u.s.next.match(/^(S\d+)/) || [,''])[1];
      return '<span class="soon">' + u.s.name + (season ? ' ' + season : '') + '</span> · ' +
             (days === 1 ? 'tomorrow' : days + ' days');
    };

    let line1 = '', line2 = '';
    if (airing.length) {
      line1 = '<span class="dot"></span><span class="hot">' +
              (airing.length === 1 ? airing[0].name + ' · ' + airing[0].airing : airing.length + ' shows airing now') +
              '</span>';
      if (upcoming[0]) line2 = 'soon: ' + fmtUp(upcoming[0]);
    } else {
      if (upcoming[0]) line1 = 'next: ' + fmtUp(upcoming[0]);
      if (upcoming[1]) line2 = 'then: ' + fmtUp(upcoming[1]);
    }
    el.innerHTML = [line1, line2].filter(Boolean).join('<br>');
  } catch (_) {}
})();

(function filmsTeaser() {
  const el = document.getElementById('films-sub');
  if (!el || typeof FILMS === 'undefined') return;
  try {
    const now = new Date();
    const ymd = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const today = ymd(now);

    const dated    = FILMS.filter(f => f.vodDate);
    const ready    = dated.filter(f => f.vodDate <= today);
    const upcoming = dated.filter(f => f.vodDate > today).sort((a,b) => a.vodDate.localeCompare(b.vodDate));

    const niceWhen = iso => {
      const target = new Date(iso + 'T00:00:00');
      const days = Math.round((target - new Date(today + 'T00:00:00')) / 86400000);
      if (days === 0) return 'today';
      if (days === 1) return 'tomorrow';
      const label = target.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
      return days <= 7 ? label + ' · ' + days + ' days' : label;
    };

    const soonLine = (label, nxt) => {
      const also = upcoming.filter(f => f.vodDate === nxt.vodDate).length - 1;
      return label + ': <span class="soon">' + nxt.title + '</span>' +
             (also > 0 ? ' +' + also : '') + ' · ' + niceWhen(nxt.vodDate);
    };

    let line1 = '', line2 = '';
    if (ready.length > 0) {
      const droppedToday = ready.filter(f => f.vodDate === today);
      const pick = ready.slice().sort((a,b) => (b.imdbRating||0) - (a.imdbRating||0))[0];
      line1 = droppedToday.length
        ? '<span class="dot"></span><span class="hot">NEW TODAY: ' + droppedToday[0].title + '</span>'
        : '<span class="dot"></span><span class="hot">' + ready.length +
          (ready.length === 1 ? ' film ready' : ' films ready') + '</span>' +
          (pick && pick.imdbRating ? ' · top: ' + pick.title + ' ★' + pick.imdbRating.toFixed(1) : '');
      if (upcoming.length) line2 = soonLine('soon', upcoming[0]);
    } else if (upcoming.length) {
      line1 = soonLine('next', upcoming[0]);
      const then = upcoming.find(f => f.vodDate > upcoming[0].vodDate);
      if (then) line2 = 'then: <span class="soon">' + then.title + '</span> · ' + niceWhen(then.vodDate);
    } else {
      line1 = FILMS.length + ' tracked · no dates confirmed yet';
    }
    el.innerHTML = [line1, line2].filter(Boolean).join('<br>');
  } catch (_) { /* leave blank on any hiccup */ }
})();
</script>
