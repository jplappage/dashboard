  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Full-page starfield (dimmed) ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image: var(--stars-hub);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: transparent;
      padding: 64px 32px 48px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffe81f 0%, #fff7a0 50%, #ffe81f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(255,232,31,0.35));
    }

    header h1::after {
      content: '';
      display: block;
      width: 90px;
      height: 3px;
      margin: 18px auto 0;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, #ffe81f, transparent);
    }

    main {
      padding: 0 32px 60px;
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 20px 22px;
      text-decoration: none;
      color: inherit;
      display: grid;
      grid-template-columns: auto 1fr;
      column-gap: 16px;
      align-items: center;
      min-height: 96px;
      text-align: left;
      transition: all 0.2s ease;
      backdrop-filter: blur(2px);
    }

    .card:hover {
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
      background: rgba(255,255,255,0.05);
    }

    .card-icon {
      grid-row: 1 / span 2;
      font-size: 2rem;
      line-height: 1;
    }
    /* brand-logo card icons — uniform 54px tiles */
    img.card-icon {
      width: 54px;
      height: 54px;
      box-sizing: border-box;
      object-fit: cover;
      border-radius: 12px;
    }

    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #ffe81f;
    }

    .card-sub {
      margin-top: 5px;
      font-size: 0.76rem;
      line-height: 1.5;
      color: #8a8899;
      min-height: 1em;
    }
    .card-sub .hot { color: #d9dcea; font-weight: 600; }
    .card-sub .soon { color: #d9dcea; font-weight: 600; }
    .card-sub .dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80; margin-right: 5px; vertical-align: 1px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.72rem;
      color: #444;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .card {
        display: grid;
        grid-template-columns: auto 1fr;
        column-gap: 16px;
        align-items: center;
        height: auto;
        min-height: 0;
        padding: 16px 18px;
        text-align: left;
      }
      .card-icon {
        grid-row: 1 / span 2;
        font-size: 2rem;
        margin-bottom: 0;
      }
      .card-title {
        font-size: 0.92rem;
      }
      .card-sub {
        margin-top: 4px;
        min-height: 0;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 40px 16px 32px;
      }
      header h1 {
        font-size: 2rem;
        letter-spacing: 3px;
      }
      main {
        padding: 0 16px 40px;
      }
    }
  </style>
</head>

<script>
(async function retroTeaser() {
  const el = document.getElementById('retro-sub');
  if (!el || typeof RETRO_FILMS === 'undefined') return;
  try {
    const films = RETRO_FILMS.map(f => ({ id: f.id, title: f.title }));
    if (!films.length) return;

    let watched = {};
    try {
      const j = await (await fetch('https://api.github.com/gists/5411ac8d12fdc31aa3fa73e4d66f6377', { cache:'no-store' })).json();
      watched = JSON.parse(j.files['watchlist.json'].content);
    } catch (_) {
      watched = RETRO_LETTERBOXD;
    }

    const isWatched = f => typeof watched[f.id] === 'string';
    const done = films.filter(isWatched).length;
    const left = films.filter(f => !isWatched(f));

    const line1 = '<span class="soon">' + done + '/' + films.length + ' watched</span> · ' + left.length + ' to go';
    let line2 = '';
    if (left.length) {
      const seed = +new Date().toISOString().slice(0,10).replace(/-/g,'');
      const pick = left[seed % left.length];
      line2 = "Claude's pick: <span class=\"hot\">" + pick.title + '</span>';
    } else {
      line2 = 'all watched — legend 🏆';
    }
    el.innerHTML = line1 + '<br>' + line2;
  } catch (_) {}
})();
</script>
<script>
(function showsTeaser() {
  const el = document.getElementById('shows-sub');
  if (!el || typeof SHOWS === 'undefined') return;
  try {
    const now = new Date();
    const ymd = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const today = ymd(now);

    const airing = SHOWS.filter(s => s.airing && s.airingUntil && s.airingUntil >= today);

    const MONTHS = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
    const upcoming = SHOWS
      .map(s => {
        const m = s.next && s.next.match(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{4})/);
        if (!m) return null;
        const d = new Date(+m[3], MONTHS[m[2]], +m[1]);
        return ymd(d) > today ? { s, d, iso: ymd(d) } : null;
      })
      .filter(Boolean)
      .sort((a,b) => a.iso.localeCompare(b.iso));

    const fmtUp = u => {
      const days = Math.round((u.d - new Date(today + 'T00:00:00')) / 86400000);
      const season = (u.s.next.match(/^(S\d+)/) || [,''])[1];
      return '<span class="soon">' + u.s.name + (season ? ' ' + season : '') + '</span> · ' +
             (days === 1 ? 'tomorrow' : days + ' days');
    };

    let line1 = '', line2 = '';
    if (airing.length) {
      line1 = '<span class="dot"></span><span class="hot">' +
              (airing.length === 1 ? airing[0].name + ' · ' + airing[0].airing : airing.length + ' shows airing now') +
              '</span>';
      if (upcoming[0]) line2 = 'soon: ' + fmtUp(upcoming[0]);
    } else {
      if (upcoming[0]) line1 = 'next: ' + fmtUp(upcoming[0]);
      if (upcoming[1]) line2 = 'then: ' + fmtUp(upcoming[1]);
    }
    el.innerHTML = [line1, line2].filter(Boolean).join('<br>');
  } catch (_) {}
})();

(function filmsTeaser() {
  const el = document.getElementById('films-sub');
  if (!el || typeof FILMS === 'undefined') return;
  try {
    const now = new Date();
    const ymd = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const today = ymd(now);

    const dated    = FILMS.filter(f => f.vodDate);
    const ready    = dated.filter(f => f.vodDate <= today);
    const upcoming = dated.filter(f => f.vodDate > today).sort((a,b) => a.vodDate.localeCompare(b.vodDate));

    const niceWhen = iso => {
      const target = new Date(iso + 'T00:00:00');
      const days = Math.round((target - new Date(today + 'T00:00:00')) / 86400000);
      if (days === 0) return 'today';
      if (days === 1) return 'tomorrow';
      return days + ' days';
    };

    const soonLine = (label, nxt) => {
      const also = upcoming.filter(f => f.vodDate === nxt.vodDate).length - 1;
      return label + ': <span class="soon">' + nxt.title + '</span>' +
             (also > 0 ? ' +' + also : '') + ' · ' + niceWhen(nxt.vodDate);
    };

    let line1 = '', line2 = '';
    if (ready.length > 0) {
      const droppedToday = ready.filter(f => f.vodDate === today);
      const pick = ready.slice().sort((a,b) => (b.imdbRating||0) - (a.imdbRating||0))[0];
      line1 = droppedToday.length
        ? '<span class="dot"></span><span class="hot">NEW TODAY: ' + droppedToday[0].title + '</span>'
        : '<span class="dot"></span><span class="hot">' + ready.length +
          (ready.length === 1 ? ' film ready' : ' films ready') + '</span>' +
          (pick && pick.imdbRating ? ' · top: ' + pick.title + ' ★' + pick.imdbRating.toFixed(1) : '');
      if (upcoming.length) line2 = soonLine('soon', upcoming[0]);
    } else if (upcoming.length) {
      line1 = soonLine('next', upcoming[0]);
      const then = upcoming.find(f => f.vodDate > upcoming[0].vodDate);
      if (then) line2 = 'then: <span class="soon">' + then.title + '</span> · ' + niceWhen(then.vodDate);
    } else {
      line1 = FILMS.length + ' tracked · no dates confirmed yet';
    }
    el.innerHTML = [line1, line2].filter(Boolean).join('<br>');
  } catch (_) { /* leave blank on any hiccup */ }
})();

(async function worldCupTeaser() {
  const el = document.getElementById('wc-sub');
  if (!el) return;
  try {
    const j = await (await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200')).json();
    const now = new Date();
    const games = (j.events || [])
      .filter(e => new Date(e.date) > now && e.status && e.status.type && e.status.type.state === 'pre')
      .map(e => {
        let label = e.shortName || e.name || '';
        try {
          const c = e.competitions[0].competitors;
          const h = c.find(x => x.homeAway === 'home'), a = c.find(x => x.homeAway === 'away');
          label = h.team.shortDisplayName + ' v ' + a.team.shortDisplayName;
        } catch (_) {}
        return { d: new Date(e.date), label };
      })
      .sort((a,b) => a.d - b.d)
      .slice(0, 2);
    if (!games.length) return;

    const fmt = g => {
      const days = Math.round((new Date(g.d.getFullYear(), g.d.getMonth(), g.d.getDate()) -
                               new Date(now.getFullYear(), now.getMonth(), now.getDate())) / 86400000);
      const time = g.d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      const when = days === 0 ? 'today ' + time
                 : days === 1 ? 'tomorrow ' + time
                 : days + ' days';
      return '<span class="soon">' + g.label + '</span> · ' + when;
    };
    el.innerHTML = games.map((g, i) => (i === 0 ? 'next: ' : 'then: ') + fmt(g)).join('<br>');
  } catch (_) {}
})();

(async function lineupTeaser() {
  const el = document.getElementById('lineup-sub');
  if (!el) return;
  const LABEL = { france: 'FRA', liverpool: 'LIV' };

  // Squad availability — read from the lineup builder's synced gist state
  // (c = conditions keyed by player id, ps = section: 'squad' = main squad)
  const availP = (async () => {
    try {
      const j = await (await fetch('https://api.github.com/gists/5411ac8d12fdc31aa3fa73e4d66f6377', { cache:'no-store' })).json();
      const data = JSON.parse(j.files['watchlist.json'].content);
      const counts = key => {
        const st = data[key];
        if (!st || !st.c) return null;
        let inj = 0, sus = 0, away = 0;
        Object.entries(st.c).forEach(([id, c]) => {
          if (st.ps && st.ps[id] && st.ps[id] !== 'squad') return; // main squad only
          if (c === 'injured') inj++; else if (c === 'suspended') sus++; else if (c === 'away') away++;
        });
        return { inj, sus, away };
      };
      return { france: counts('lineup_france'), liverpool: counts('lineup_liverpool') };
    } catch (_) { return null; }
  })();

  // Next scheduled game — France (World Cup) / Liverpool (Premier League) via ESPN
  const nextP = (async () => {
    const games = [];
    const compName = e => {
      try {
        const c = e.competitions[0].competitors;
        const h = c.find(x => x.homeAway === 'home'), a = c.find(x => x.homeAway === 'away');
        return h.team.shortDisplayName + ' v ' + a.team.shortDisplayName;
      } catch (_) { return e.shortName || e.name || ''; }
    };
    const pull = async (team, url, filter) => {
      try {
        const j = await (await fetch(url)).json();
        const evs = j.events || (j.team && j.team.nextEvent) || [];
        evs.forEach(e => {
          const d = new Date(e.date);
          if (d > new Date() && (!filter || filter(e))) games.push({ d, team, label: compName(e) });
        });
      } catch (_) {}
    };
    // Liverpool: ESPN team endpoints are per-competition, so check them all —
    // Premier League, Champions League, FA Cup, League Cup, friendlies
    const LFC_COMPS = ['eng.1', 'uefa.champions', 'eng.fa', 'eng.league_cup', 'club.friendly'];
    await Promise.all([
      pull('france', 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200',
           e => /france/i.test(e.name || '')),
      ...LFC_COMPS.map(c => pull('liverpool', 'https://site.api.espn.com/apis/site/v2/sports/soccer/' + c + '/teams/364')),
    ]);
    return games.sort((a,b) => a.d - b.d)[0] || null;
  })();

  const [avail, nxt] = await Promise.all([availP, nextP]);

  let nextLine = '', availLine = '';
  if (nxt) {
    const now = new Date();
    const days = Math.round((new Date(nxt.d.getFullYear(), nxt.d.getMonth(), nxt.d.getDate()) -
                             new Date(now.getFullYear(), now.getMonth(), now.getDate())) / 86400000);
    const time = nxt.d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    const when = days === 0 ? 'today ' + time
               : days === 1 ? 'tomorrow ' + time
               : days + ' days';
    nextLine = 'next: <span class="soon">' + nxt.label + '</span> · ' + when;

    // Availability for the team playing next only
    const c = avail && avail[nxt.team];
    if (c) {
      const bits = [];
      if (c.inj) bits.push('<span style="color:#f87171">' + c.inj + ' injured</span>');
      if (c.sus) bits.push('<span style="color:#fb923c">' + c.sus + ' suspended</span>');
      if (c.away) bits.push('<span style="color:#60a5fa">' + c.away + ' away</span>');
      availLine = LABEL[nxt.team] + ': ' + (bits.length ? bits.join(', ') : '<span class="hot">all fit</span>');
    }
  }
  el.innerHTML = [nextLine, availLine].filter(Boolean).join('<br>');
})();
</script>

  <!-- Web Push opt-in: subscribes this installed app and stores the push
       subscription in the (public) gist so the GitHub Action can send to it.

  <script>
  (function () {
    var VAPID_PUBLIC = 'BOXxcVQCiYh5lc0vydERBmY4EOJRWiIdOyPopYAArut3QRFuDDTUazA3nbRTrcaylYX_fBTZfWAdEXiNRDlKIOo';
    var GIST_ID = '5411ac8d12fdc31aa3fa73e4d66f6377';
    var SUB_FILE = 'push-subscription.json';
    var row = document.getElementById('push-row');
    if (!row) return;
    if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) return;

    function b64ToU8(base64) {
      var pad = '='.repeat((4 - base64.length % 4) % 4);
      var b64 = (base64 + pad).replace(/-/g, '+').replace(/_/g, '/');
      var raw = atob(b64), arr = new Uint8Array(raw.length);
      for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
      return arr;
    }
    function status(txt) {
      row.innerHTML = '<span style="color:#8a8899;font-size:0.72rem">' + txt + '</span>';
    }
    function button(label, fn) {
      row.innerHTML = '<button style="background:rgba(255,232,31,0.12);border:1px solid rgba(255,232,31,0.4);' +
        'color:#ffe81f;padding:7px 16px;border-radius:100px;font-size:0.75rem;cursor:pointer">' + label + '</button>';
      row.firstChild.onclick = fn;
    }
    function getToken() {
      var t = localStorage.getItem('gistToken');
      if (!t) { t = prompt('Paste GitHub gist token (stored only in this browser):', '') || ''; if (t) localStorage.setItem('gistToken', t); }
      return t;
    }
    async function saveSubscription(sub) {
      var t = getToken();
      if (!t) throw new Error('token needed');
      var H = { 'Authorization': 'token ' + t, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
      var list = [];
      try {
        var j = await (await fetch('https://api.github.com/gists/' + GIST_ID, { cache: 'no-store' })).json();
        if (j.files && j.files[SUB_FILE]) { list = JSON.parse(j.files[SUB_FILE].content) || []; if (!Array.isArray(list)) list = [list]; }
      } catch (_) {}
      var s = sub.toJSON();
      list = list.filter(function (x) { return x.endpoint !== s.endpoint; });
      list.push(s);
      var body = {}; body.files = {}; body.files[SUB_FILE] = { content: JSON.stringify(list) };
      var res = await fetch('https://api.github.com/gists/' + GIST_ID, { method: 'PATCH', headers: H, body: JSON.stringify(body) });
      if (res.status !== 200) throw new Error('gist save failed (' + res.status + ')');
    }
    async function enable() {
      try {
        status('Enabling…');
        var reg = await navigator.serviceWorker.ready;
        var perm = await Notification.requestPermission();
        if (perm !== 'granted') { status('Notifications not allowed — enable them for this app in Settings'); return; }
        var sub = await reg.pushManager.getSubscription();
        if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: b64ToU8(VAPID_PUBLIC) });
        await saveSubscription(sub);
        status('✓ Date alerts on for this device');
      } catch (e) {
        button('Try again', enable);
        var note = document.createElement('div');
        note.style.cssText = 'color:#8a8899;font-size:0.68rem;margin-top:6px';
        note.textContent = String(e && e.message || e).indexOf('token') > -1
          ? 'Needs your gist token.' : "Couldn't enable (open from your Home Screen icon, not Safari).";
        row.appendChild(note);
      }
    }
    (async function init() {
      try {
        var reg = await navigator.serviceWorker.ready;
        var sub = reg.pushManager && await reg.pushManager.getSubscription();
        if (sub && Notification.permission === 'granted') { status('✓ Date alerts on'); return; }
      } catch (_) {}
      button('Enable date alerts', enable);
    })();
  })();
