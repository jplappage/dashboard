      margin: 18px auto 0;

      background: linear-gradient(90deg, transparent, #ffe81f, transparent);

      padding: 0 32px 60px;

      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;

      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;

      text-align: left;

      backdrop-filter: blur(2px);

      border-color: rgba(255,255,255,0.4);

      background: rgba(255,255,255,0.05);

<script>
(async function retroTeaser() {
  const el = document.getElementById('retro-sub');
  if (!el) return;
  try {
    const html = await (await fetch('retro-watchlist.html')).text();
    const films = [...html.matchAll(/\{id:(\d+),\s*title:"([^"]+)",\s*year:(\d{4})[^}]*?lbRating:([\d.]+)/g)]
      .map(m => ({ id:+m[1], title:m[2], year:+m[3], lb:+m[4] }));
    if (!films.length) return;

    let watched = {};
    try {
      const j = await (await fetch('https://api.github.com/gists/5411ac8d12fdc31aa3fa73e4d66f6377', { cache:'no-store' })).json();
      watched = JSON.parse(j.files['watchlist.json'].content);
    } catch (_) {
      [...html.matchAll(/^\s*(\d+):\s*"\d{4}-\d{2}-\d{2}"/gm)].forEach(m => watched[m[1]] = '1');
    }

    const isWatched = f => typeof watched[f.id] === 'string';
    const done = films.filter(isWatched).length;
    const left = films.filter(f => !isWatched(f));

    const line1 = '<span class="soon">' + done + '/' + films.length + ' watched</span> · ' + left.length + ' to go';
    let line2 = '';
    if (left.length) {
      const seed = +new Date().toISOString().slice(0,10).replace(/-/g,'');
      const pick = left[seed % left.length];
      line2 = "tonight's pick: <span class=\"hot\">" + pick.title + '</span> (' + pick.year + ') · ★' + pick.lb.toFixed(1);
    } else {
      line2 = 'all watched — legend 🏆';
    }
    el.innerHTML = line1 + '<br>' + line2;
  } catch (_) {}
})();
</script>
<script>
(function showsTeaser() {
  const el = document.getElementById('shows-sub');
  if (!el || typeof SHOWS === 'undefined') return;
  try {
    const now = new Date();
    const ymd = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const today = ymd(now);

    const airing = SHOWS.filter(s => s.airing && s.airingUntil && s.airingUntil >= today);

    const MONTHS = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
    const upcoming = SHOWS
      .map(s => {
        const m = s.next && s.next.match(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{4})/);
        if (!m) return null;
        const d = new Date(+m[3], MONTHS[m[2]], +m[1]);
        return ymd(d) > today ? { s, d, iso: ymd(d) } : null;
      })
      .filter(Boolean)
      .sort((a,b) => a.iso.localeCompare(b.iso));

    const fmtUp = u => {
      const days = Math.round((u.d - new Date(today + 'T00:00:00')) / 86400000);
      const season = (u.s.next.match(/^(S\d+)/) || [,''])[1];
      return '<span class="soon">' + u.s.name + (season ? ' ' + season : '') + '</span> · ' +
             (days === 1 ? 'tomorrow' : days + ' days');
    };

    let line1 = '', line2 = '';
    if (airing.length) {
      line1 = '<span class="dot"></span><span class="hot">' +
              (airing.length === 1 ? airing[0].name + ' · ' + airing[0].airing : airing.length + ' shows airing now') +
              '</span>';
      if (upcoming[0]) line2 = 'soon: ' + fmtUp(upcoming[0]);
    } else {
      if (upcoming[0]) line1 = 'next: ' + fmtUp(upcoming[0]);
      if (upcoming[1]) line2 = 'then: ' + fmtUp(upcoming[1]);
    }
    el.innerHTML = line1 || line2;
  } catch (_) {}
})();

(function filmsTeaser() {
  const el = document.getElementById('films-sub');
  if (!el || typeof FILMS === 'undefined') return;
  try {
    const now = new Date();
    const ymd = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const today = ymd(now);

    const dated    = FILMS.filter(f => f.vodDate);
    const ready    = dated.filter(f => f.vodDate <= today);
    const upcoming = dated.filter(f => f.vodDate > today).sort((a,b) => a.vodDate.localeCompare(b.vodDate));

    const niceWhen = iso => {
      const target = new Date(iso + 'T00:00:00');
      const days = Math.round((target - new Date(today + 'T00:00:00')) / 86400000);
      if (days === 0) return 'today';
      if (days === 1) return 'tomorrow';
      const label = target.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
      return days <= 7 ? label + ' · ' + days + ' days' : label;
    };

    const soonLine = (label, nxt) => {
      const also = upcoming.filter(f => f.vodDate === nxt.vodDate).length - 1;
      return label + ': <span class="soon">' + nxt.title + '</span>' +
             (also > 0 ? ' +' + also : '') + ' · ' + niceWhen(nxt.vodDate);
    };

    let line1 = '', line2 = '';
    if (ready.length > 0) {
      const droppedToday = ready.filter(f => f.vodDate === today);
      const pick = ready.slice().sort((a,b) => (b.imdbRating||0) - (a.imdbRating||0))[0];
      line1 = droppedToday.length
        ? '<span class="dot"></span><span class="hot">NEW TODAY: ' + droppedToday[0].title + '</span>'
        : '<span class="dot"></span><span class="hot">' + ready.length +
          (ready.length === 1 ? ' film ready' : ' films ready') + '</span>' +
          (pick && pick.imdbRating ? ' · top: ' + pick.title + ' ★' + pick.imdbRating.toFixed(1) : '');
      if (upcoming.length) line2 = soonLine('soon', upcoming[0]);
    } else if (upcoming.length) {
      line1 = soonLine('next', upcoming[0]);
      const then = upcoming.find(f => f.vodDate > upcoming[0].vodDate);
      if (then) line2 = 'then: <span class="soon">' + then.title + '</span> · ' + niceWhen(then.vodDate);
    } else {
      line1 = FILMS.length + ' tracked · no dates confirmed yet';
    }
    el.innerHTML = line1 || line2;
  } catch (_) { /* leave blank on any hiccup */ }
})();

(async function worldCupTeaser() {
  const el = document.getElementById('wc-sub');
  if (!el) return;
  try {
    const j = await (await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200')).json();
    const now = new Date();
    const games = (j.events || [])
      .filter(e => new Date(e.date) > now && e.status && e.status.type && e.status.type.state === 'pre')
      .map(e => {
        let label = e.shortName || e.name || '';
        try {
          const c = e.competitions[0].competitors;
          const h = c.find(x => x.homeAway === 'home'), a = c.find(x => x.homeAway === 'away');
          label = h.team.shortDisplayName + ' v ' + a.team.shortDisplayName;
        } catch (_) {}
        return { d: new Date(e.date), label };
      })
      .sort((a,b) => a.d - b.d)
      .slice(0, 2);
    if (!games.length) return;

    const fmt = g => {
      const days = Math.round((new Date(g.d.getFullYear(), g.d.getMonth(), g.d.getDate()) -
                               new Date(now.getFullYear(), now.getMonth(), now.getDate())) / 86400000);
      const time = g.d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      const when = days === 0 ? 'today ' + time
                 : days === 1 ? 'tomorrow ' + time
                 : g.d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }) + ' · ' + time;
      return '<span class="soon">' + g.label + '</span> · ' + when;
    };
    el.innerHTML = games.map((g, i) => (i === 0 ? 'next: ' : 'then: ') + fmt(g)).join('<br>');
  } catch (_) {}
})();

(async function lineupTeaser() {
  const el = document.getElementById('lineup-sub');
  if (!el) return;
  const LABEL = { france: 'FRA', liverpool: 'LIV' };

  // Squad availability — read from the lineup builder's synced gist state
  // (c = conditions keyed by player id, ps = section: 'squad' = main squad)
  const availP = (async () => {
    try {
      const j = await (await fetch('https://api.github.com/gists/5411ac8d12fdc31aa3fa73e4d66f6377', { cache:'no-store' })).json();
      const data = JSON.parse(j.files['watchlist.json'].content);
      const counts = key => {
        const st = data[key];
        if (!st || !st.c) return null;
        let inj = 0, sus = 0;
        Object.entries(st.c).forEach(([id, c]) => {
          if (st.ps && st.ps[id] && st.ps[id] !== 'squad') return; // main squad only
          if (c === 'injured') inj++; else if (c === 'suspended') sus++;
        });
        return { inj, sus };
      };
      return { france: counts('lineup_france'), liverpool: counts('lineup_liverpool') };
    } catch (_) { return null; }
  })();

  // Next scheduled game — France (World Cup) / Liverpool (Premier League) via ESPN
  const nextP = (async () => {
    const games = [];
    const compName = e => {
      try {
        const c = e.competitions[0].competitors;
        const h = c.find(x => x.homeAway === 'home'), a = c.find(x => x.homeAway === 'away');
        return h.team.shortDisplayName + ' v ' + a.team.shortDisplayName;
      } catch (_) { return e.shortName || e.name || ''; }
    };
    const pull = async (team, url, filter) => {
      try {
        const j = await (await fetch(url)).json();
        const evs = j.events || (j.team && j.team.nextEvent) || [];
        evs.forEach(e => {
          const d = new Date(e.date);
          if (d > new Date() && (!filter || filter(e))) games.push({ d, team, label: compName(e) });
        });
      } catch (_) {}
    };
    // Liverpool: ESPN team endpoints are per-competition, so check them all —
    // Premier League, Champions League, FA Cup, League Cup, friendlies
    const LFC_COMPS = ['eng.1', 'uefa.champions', 'eng.fa', 'eng.league_cup', 'club.friendly'];
    await Promise.all([
      pull('france', 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200',
           e => /france/i.test(e.name || '')),
      ...LFC_COMPS.map(c => pull('liverpool', 'https://site.api.espn.com/apis/site/v2/sports/soccer/' + c + '/teams/364')),
    ]);
    return games.sort((a,b) => a.d - b.d)[0] || null;
  })();

  const [avail, nxt] = await Promise.all([availP, nextP]);

  let nextLine = '', availLine = '';
  if (nxt) {
    const now = new Date();
    const days = Math.round((new Date(nxt.d.getFullYear(), nxt.d.getMonth(), nxt.d.getDate()) -
                             new Date(now.getFullYear(), now.getMonth(), now.getDate())) / 86400000);
    const time = nxt.d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    const when = days === 0 ? 'today ' + time
               : days === 1 ? 'tomorrow ' + time
               : nxt.d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }) + ' · ' + time;
    nextLine = 'next: <span class="soon">' + nxt.label + '</span> · ' + when;

    // Availability for the team playing next only
    const c = avail && avail[nxt.team];
    if (c) {
      const bits = [];
      if (c.inj) bits.push('<span style="color:#f87171">' + c.inj + ' injured</span>');
      if (c.sus) bits.push('<span style="color:#fb923c">' + c.sus + ' suspended</span>');
      availLine = LABEL[nxt.team] + ': ' + (bits.length ? bits.join(', ') : '<span class="hot">all fit</span>');
    }
  }
  el.innerHTML = nextLine || availLine;
})();
</script>
