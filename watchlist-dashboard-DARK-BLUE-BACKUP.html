<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP's Dashboard</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header {
      background: linear-gradient(135deg, #0d0d1a 0%, #12122a 40%, #0f2045 100%);
      padding: 36px 32px 28px;
      border-bottom: 2px solid #1e2a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -60px;
      left: -60px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: 10%;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-left {
      position: relative;
      z-index: 1;
    }

    .header-left h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 0%, #c7d2fe 60%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .header-left p {
      font-size: 0.85rem;
      color: #6b7aaa;
      margin-top: 6px;
      letter-spacing: 0.2px;
    }

    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot-out { background: #22c55e; }
    .dot-soon { background: #f59e0b; }
    .dot-unknown { background: #6b7280; }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      background: #13131c;
      border-bottom: 1px solid #1e1e2e;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid #2a2a3e;
      background: transparent;
      color: #8888aa;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .filter-btn:hover, .filter-btn.active {
      background: #e6007a;
      border-color: #e6007a;
      color: white;
    }

    .section {
      padding: 24px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e1e2e;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1a1a2e;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a2a3e;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #e6007a;
      box-shadow: 0 8px 32px rgba(230, 0, 122, 0.2);
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(230, 0, 122, 0.15);
      opacity: 0;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .card-overlay-text {
      background: #e6007a;
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.5px;
    }

    .poster-wrap {
      position: relative;
      aspect-ratio: 2/3;
      background: #0f0f1a;
      overflow: hidden;
    }

    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .poster-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      font-size: 2rem;
    }

    .badge {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-out {
      background: #166534;
      color: #4ade80;
      border: 1px solid #22c55e40;
    }

    .badge-soon {
      background: #78350f;
      color: #fbbf24;
      border: 1px solid #f59e0b40;
    }

    .badge-unknown {
      background: #450a0a;
      color: #f87171;
      border: 1px solid #ef444440;
    }

    .card-body {
      padding: 10px;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
      color: #e8e8f0;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-year {
      font-size: 0.7rem;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .card-date {
      font-size: 0.72rem;
      font-weight: 500;
    }

    .date-out { color: #4ade80; }
    .date-soon { color: #fbbf24; }
    .date-unknown { color: #f87171; }

    .date-platform {
      font-size: 0.65rem;
      color: #6b7280;
      margin-top: 2px;
    }

    .date-estimated {
      font-size: 0.62rem;
      color: #6b7280;
      font-style: italic;
    }

    .badge-tv {
      background: #1e3a5f;
      color: #60a5fa;
      border: 1px solid #3b82f640;
    }

    .tv-divider {
      margin: 8px 24px 0;
      border: none;
      border-top: 1px solid #2a2a3e;
    }

    .last-updated {
      text-align: center;
      padding: 20px;
      font-size: 0.72rem;
      color: #6b7280;
      border-top: 1px solid #1e1e2e;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>

function getStatus(film) {
  if (!film.vodDate) return 'unknown';
  const d = new Date(film.vodDate);
  return d <= TODAY ? 'out' : 'soon';
}

function formatDate(dateStr) {
  if (!dateStr) return '??';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function plexUrl(slug) {
  return `https://watch.plex.tv/en-GB/movie/${slug}`;
}

let currentFilter = 'all';

function filterFilms(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFilms();
}

function renderFilms() {
  const container = document.getElementById('film-container');

  // Normalise TV shows into the same shape as films for grouping
  const tvAsFilms = TV_SHOWS.map(s => ({
    ...s,
    vodDate: s.streamDate,
    isTV: true,
  }));

  const all = [...FILMS, ...tvAsFilms];

  const visible = currentFilter === 'tv' ? all.filter(f => f.isTV)
               : currentFilter === 'films' ? all.filter(f => !f.isTV)
               : all;

  const groups = {
    out:     visible.filter(f => getStatus(f) === 'out').sort((a, b) => new Date(b.vodDate) - new Date(a.vodDate)),
    soon:    visible.filter(f => getStatus(f) === 'soon').sort((a, b) => new Date(a.vodDate) - new Date(b.vodDate)),
    unknown: visible.filter(f => getStatus(f) === 'unknown'),
  };

  document.getElementById('count-out').textContent = groups.out.length;
  document.getElementById('count-soon').textContent = groups.soon.length;
  document.getElementById('count-unknown').textContent = groups.unknown.length;

  let html = '';

  const renderSection = (title, items, sectionId) => {
    if (items.length === 0) return '';
    if (currentFilter !== 'all' && currentFilter !== 'tv' && currentFilter !== 'films' && currentFilter !== sectionId) return '';
    return `
      <div class="section-title">${title}</div>
      <div class="grid" style="margin-bottom:32px">
        ${items.map(item => item.isTV ? renderTVCard(item) : renderCard(item)).join('')}
      </div>
    `;
  };

  html += renderSection('✅ Available Now on VOD / Streaming', groups.out, 'out');
  html += renderSection('<span style="color:#f59e0b">▶</span> Coming Soon', groups.soon, 'soon');
  html += renderSection('❓ TBC', groups.unknown, 'unknown');

  container.innerHTML = html || '<p style="color:#6b7280;padding:24px">No items match this filter.</p>';
}


function renderTVCard(show) {
  const isOut = new Date(show.streamDate) <= TODAY;
  const badgeText = isOut ? `S${show.season} Streaming` : `S${show.season} Coming`;
  const badgeClass = isOut ? 'badge-out' : 'badge-soon';
  const dateClass = isOut ? 'date-out' : 'date-soon';
  const dateText = isOut ? `Since ${formatDate(show.streamDate)}` : `From ${formatDate(show.streamDate)}`;
  const newBadge = show.isNew ? `<span style="display:inline-block;background:#7c3aed;color:#fff;font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px;vertical-align:middle;">🆕 NEW</span>` : '';

  return `
    <a class="card" href="https://watch.plex.tv/en-GB/show/${show.slug}" target="_blank" rel="noopener">
      <div class="poster-wrap">
        <img src="${show.poster}" alt="${show.title}" loading="lazy"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
        <div class="poster-placeholder" style="display:none">📺</div>
        <span class="badge ${badgeClass}">${badgeText}</span>
        <span class="badge badge-tv" style="top:auto;bottom:8px;left:8px;">TV</span>
      </div>
      <div class="card-overlay">
        <span class="card-overlay-text">▶ Watch on Plex</span>
      </div>
      <div class="card-body">
        <div class="card-title">${show.title}${newBadge}</div>
        <div class="card-year">${show.platform}</div>
        <div class="card-date ${dateClass}">${dateText}</div>
        <div class="date-platform">${show.note}</div>
      </div>
    </a>
  `;
}
