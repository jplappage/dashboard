name: Update VOD dates

# Auto-refreshes streaming/VOD dates in films-data.js from WhenToStream, so
# release dates stay current even when the laptop is off. Runs on GitHub's
# servers every 6 hours. Only touches VOD dates for films already on the
# watchlist — it never adds new films or archives watched ones (those need a
# logged-in Letterboxd session). See update_vod_dates.py for the logic.

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:         # allow manual runs from the Actions tab
    inputs:
      test_push:
        description: 'Send a test notification (no date change needed)'
        type: boolean
        default: false

permissions:
  contents: write

# Don't let overlapping scheduled runs collide.
concurrency:
  group: update-vod-dates
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update VOD dates from WhenToStream
        env:
          # Write the run summary to a throwaway path, never a repo file.
          VOD_SUMMARY_FILE: ${{ runner.temp }}/vod-summary.txt
          # Optional: fills IMDb ratings for released films (no key = skipped).
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: python3 update_vod_dates.py

      - name: Detect real change
        # Gate everything below on films-data.js actually changing. watchlist.ics
        # is NOT part of this check — its DTSTAMP changes every run, which used to
        # trigger a commit + notification even when no film date moved.
        id: diff
        run: |
          if git diff --quiet films-data.js; then
            echo "No film date changed."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate films-data.js
        if: steps.diff.outputs.changed == 'true'
        # Strip trailing NUL padding first — harmless in the browser, trips up node.
        run: tr -d '\000' < films-data.js > /tmp/check.js && node --check /tmp/check.js

      - name: Rebuild watchlist.ics
        if: steps.diff.outputs.changed == 'true'
        # GITHUB_TOKEN pushes don't trigger the separate rebuild workflow, so
        # regenerate the calendar here and commit it in the same push.
        run: python3 generate_ics.py

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        env:
          VOD_SUMMARY_FILE: ${{ runner.temp }}/vod-summary.txt
        run: |
          git config user.name "vod-bot"
          git config user.email "actions@github.com"
          # Drop the stale tracked summary file if it's still around (one-time cleanup).
          git rm --cached --ignore-unmatch .vod-update-summary.txt >/dev/null 2>&1 || true
          git add films-data.js watchlist.ics
          git commit -m "auto: update VOD dates from WhenToStream" -m "$(cat "$VOD_SUMMARY_FILE" 2>/dev/null)"
          git push

      - name: Send push notification
        # Web Push to the installed dashboard PWA, so tapping opens your Home
        # Screen app. Fires on a real change, or on a manual run with the
        # "test_push" box ticked. Only if VAPID_PRIVATE_KEY is set. Fails safe —
        # a send error never reds the workflow.
        if: steps.diff.outputs.changed == 'true' || github.event.inputs.test_push == 'true'
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          VOD_SUMMARY_FILE: ${{ runner.temp }}/vod-summary.txt
          TEST_PUSH: ${{ github.event.inputs.test_push }}
        run: |
          # On a test run with no real change, put a friendly message in the body.
          if [ "$TEST_PUSH" = "true" ] && [ ! -s "$VOD_SUMMARY_FILE" ]; then
            echo "Test notification — your dashboard alerts are working." > "$VOD_SUMMARY_FILE"
          fi
          pip install --quiet pywebpush
          python3 send_push.py
