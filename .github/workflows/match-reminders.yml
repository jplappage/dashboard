name: Match reminders

# Every couple of hours, checks ESPN for France (World Cup) and Liverpool matches
# kicking off soon and pushes a reminder — once per match (dedup state lives in
# notified-matches.json). Reuses the same Web Push setup.

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:
    inputs:
      test_push:
        description: 'Send a test notification'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: match-reminders
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for upcoming matches
        env:
          MATCH_SUMMARY_FILE: ${{ runner.temp }}/match-summary.txt
        run: python3 match_reminders.py

      - name: Send push if a match is soon
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          VOD_SUMMARY_FILE: ${{ runner.temp }}/match-summary.txt
          TEST_PUSH: ${{ github.event.inputs.test_push }}
        run: |
          if [ "$TEST_PUSH" = "true" ] && [ ! -s "$VOD_SUMMARY_FILE" ]; then
            echo "Test notification — match reminders are working." > "$VOD_SUMMARY_FILE"
          fi
          if [ ! -s "$VOD_SUMMARY_FILE" ]; then
            echo "No match reminder due."
            exit 0
          fi
          pip install --quiet pywebpush
          python3 send_push.py

      - name: Persist dedup state
        run: |
          git add notified-matches.json
          if ! git diff --cached --quiet; then
            git config user.name "match-bot"
            git config user.email "actions@github.com"
            git commit -m "auto: match reminder dedup state"
            git push
          fi
