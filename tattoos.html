<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>charlottedoestattoos — Income Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:          #09070f;
      --surface:     #120f1e;
      --surface2:    #1c1730;
      --pink:        #ff2d78;
      --pink-glow:   rgba(255,45,120,0.35);
      --pink-dim:    rgba(255,45,120,0.18);
      --teal:        #00e5c8;
      --teal-glow:   rgba(0,229,200,0.25);
      --teal-dim:    rgba(0,229,200,0.12);
      --purple:      #b06bff;
      --yellow:      #f7d000;
      --text:        #f2eeff;
      --text-dim:    #7e78a0;
      --border:      rgba(255,45,120,0.22);
      --border-teal: rgba(0,229,200,0.22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { overflow-x: hidden; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      max-width: 100vw;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(160deg, #1a0d28 0%, #0d0a1a 60%, #0a1020 100%);
      border-bottom: 2px solid var(--pink);
      padding: 28px 24px 24px;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(176,107,255,0.15) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 50%, rgba(255,45,120,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 100%, rgba(0,229,200,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .header-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--pink), var(--purple), var(--teal), var(--pink));
      z-index: -1;
      animation: spin 4s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 3px solid var(--bg);
      display: block;
      object-fit: cover;
      background: var(--surface2);
    }

    .avatar-fallback {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 3px solid var(--bg);
      background: linear-gradient(135deg, #2d1040, #140a30);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
    }

    .title-block { text-align: left; }

    .title-block h1 {
      font-family: 'Bangers', cursive;
      font-size: 3rem;
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(120deg, #ff2d78 0%, #b06bff 50%, #00e5c8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      text-transform: lowercase;
    }

    .social-links {
      display: flex;
      gap: 14px;
      margin-top: 6px;
      align-items: center;
    }

    .social-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 1.2rem;
      transition: color 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
    }

    .social-links a:hover { color: var(--pink); transform: scale(1.2); }
    .social-links .tiktok-placeholder { color: var(--text-dim); font-size: 1.2rem; opacity: 0.4; cursor: default; }

    .title-block p {
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── Tab nav ── */
    .tab-nav {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .tab-btn {
      flex: 1;
      padding: 15px 8px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-dim);
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.02); }

    .tab-btn.active {
      color: var(--pink);
      border-bottom-color: var(--pink);
      background: var(--pink-dim);
    }

    /* ── Tab panels ── */
    .tab-panel { display: none; padding: 28px 20px 60px; max-width: 860px; margin: 0 auto; }
    .tab-panel.active { display: block; }

    /* ── Form card ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 7px; }

    label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    input[type="date"],
    input[type="number"],
    input[type="text"],
    textarea {
      background: var(--surface2);
      border: 1px solid rgba(255,45,120,0.2);
      border-radius: 9px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input:focus, textarea:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px var(--pink-dim);
    }

    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

    textarea { resize: vertical; min-height: 88px; }

    /* ── Auto-calc display ── */
    .calc-section {
      background: var(--teal-dim);
      border: 1px solid var(--border-teal);
      border-radius: 14px;
      padding: 18px 20px;
      margin: 18px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .calc-item { text-align: center; }

    .calc-item .c-val {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .calc-item .c-val.pink { color: var(--pink); }
    .calc-item .c-val.teal { color: var(--teal); }

    .calc-item .c-lbl {
      font-size: 0.68rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 4px;
    }

    .calc-item .c-sub {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .net-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 18px;
    }

    .net-row label { margin: 0; }

    .net-val {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--yellow);
    }

    /* ── Save button ── */
    .btn-save {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff2d78 0%, #c01a60 100%);
      border: none;
      border-radius: 11px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 18px var(--pink-glow);
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,45,120,0.5);
    }

    .btn-save:active { transform: translateY(0); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.3s cubic-bezier(.175,.885,.32,1.275);
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { background: var(--teal); color: #000; }
    .toast.err { background: #ff4f4f; color: #fff; }

    /* ── Records table ── */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .records-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .records-count {
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    .records-count span { color: var(--teal); font-weight: 700; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
      min-width: 600px;
    }

    thead th {
      background: var(--surface);
      color: var(--pink);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody td {
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }

    tbody tr:hover td { background: rgba(255,45,120,0.04); }

    td.num { font-weight: 600; text-align: right; }
    td.col-gross { color: var(--text); }
    td.col-vat { color: #ff8ab8; }
    td.col-true { color: var(--teal); }
    td.col-costs { color: var(--text-dim); }
    td.col-net { color: var(--yellow); font-weight: 700; }
    td.col-notes { color: var(--text-dim); font-size: 0.78rem; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .btn-del {
      background: none;
      border: 1px solid rgba(255,45,120,0.3);
      border-radius: 6px;
      color: var(--pink);
      font-size: 0.78rem;
      padding: 4px 9px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-del:hover { background: var(--pink-dim); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-dim);
    }
    .empty-state .e-icon { font-size: 3.5rem; margin-bottom: 14px; opacity: 0.6; }
    .empty-state p { font-size: 0.9rem; }

    /* ── Summary ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border-teal);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .chart-wrap h3 {
      font-family: 'Bangers', cursive;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--teal);
      margin-bottom: 18px;
    }

    .month-list {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .month-list thead th {
      text-align: left;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      padding: 0 10px 10px;
      border-bottom: 1px solid var(--border);
    }

    .month-list tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }

    .month-list tbody tr:hover { background: rgba(255,255,255,0.03); }

    .month-list td {
      padding: 12px 10px;
      color: var(--text);
    }

    .month-list td:first-child {
      font-family: 'Bangers', cursive;
      font-size: 1rem;
      letter-spacing: 1.5px;
      color: var(--pink);
    }

    .month-list td:nth-child(2) { color: var(--text-dim); }

    /* ── YTD strip ── */
    .ytd-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: rgba(176,107,255,0.08);
      border-bottom: 1px solid rgba(176,107,255,0.2);
      padding: 10px 20px;
    }

    .ytd-item { text-align: center; padding: 0 24px; }
    .ytd-lbl { display: block; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
    .ytd-val { display: block; font-size: 1rem; font-weight: 700; color: var(--text); margin-top: 2px; }
    .ytd-divider { width: 1px; height: 30px; background: rgba(255,255,255,0.1); }

    /* ── Export + edit buttons ── */
    .btn-export {
      background: rgba(0,229,200,0.1);
      border: 1px solid rgba(0,229,200,0.3);
      color: var(--teal);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: background 0.2s;
    }
    .btn-export:hover { background: rgba(0,229,200,0.2); }

    .btn-edit {
      background: rgba(176,107,255,0.12);
      border: none;
      color: var(--purple);
      border-radius: 6px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .btn-edit:hover { background: rgba(176,107,255,0.25); }

    /* ── Totals row ── */
    .totals-row td {
      border-top: 1px solid var(--border);
      font-weight: 700;
      color: var(--text);
      padding-top: 12px;
    }

    tfoot.month-list .totals-row td { border-top: 1px solid var(--border); }

    /* ── Records controls ── */
    .rec-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .rec-controls input,
    .rec-controls select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .rec-controls input { flex: 1; min-width: 140px; }
    .rec-controls select { cursor: pointer; }

    .rec-controls input:focus,
    .rec-controls select:focus { border-color: var(--pink); }

    th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    th.sortable:hover { color: var(--pink); }
    .sort-hint { opacity: 0.3; }

    /* ── Sync status ── */
    .sync-status {
      font-size: 0.7rem;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .sync-loading { background: rgba(255,215,0,0.12); color: #f7d000; }
    .sync-ok      { background: rgba(0,229,200,0.12); color: var(--teal); }
    .sync-error   { background: rgba(255,45,120,0.12); color: var(--pink); }

    /* ── Responsive ── */
    /* ── Tax estimate card ── */
    .tax-card {
      background: var(--surface);
      border: 1px solid rgba(176,107,255,0.35);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
    }

    .tax-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tax-title {
      font-family: 'Bangers', cursive;
      font-size: 1.35rem;
      letter-spacing: 2px;
      color: var(--purple);
    }

    .tax-note {
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    .tax-progress-wrap {
      background: var(--surface2);
      border-radius: 20px;
      height: 6px;
      margin-bottom: 5px;
      overflow: hidden;
    }

    .tax-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      border-radius: 20px;
      transition: width 0.6s ease;
    }

    .tax-progress-label {
      font-size: 0.68rem;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .tax-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .tax-cell {
      background: var(--surface2);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }

    .tc-lbl {
      font-size: 0.62rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tc-val {
      font-size: 1rem;
      font-weight: 700;
      margin: 4px 0 2px;
      line-height: 1;
    }

    .tc-sub {
      font-size: 0.6rem;
      color: var(--text-dim);
    }

    .tax-compare {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      margin-bottom: 10px;
    }

    .tax-compare thead th {
      text-align: right;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      padding: 0 10px 10px;
      border-bottom: 1px solid var(--border);
    }

    .tax-compare thead th:first-child { text-align: left; }

    .tax-compare td {
      padding: 10px 10px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .tc-row-lbl {
      text-align: left !important;
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .tax-compare .proj { color: var(--purple); }

    .tax-total-row td { border-top: 1px solid var(--border); border-bottom: none; padding-top: 12px; }

    .tax-proj-note {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 0.3px;
    }

    /* ── Mobile record cards (replaces table on small screens) ── */
    .record-cards { display: none; }

    .rec-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .rec-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .rec-date { font-weight: 600; font-size: 0.88rem; }

    .rec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .rec-cell { background: var(--surface2); border-radius: 8px; padding: 8px 10px; }
    .rec-cell .rc-lbl { font-size: 0.62rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .rec-cell .rc-val { font-size: 0.92rem; font-weight: 700; margin-top: 2px; }

    .rec-notes {
      font-size: 0.78rem;
      color: var(--text-dim);
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 8px;
      margin-top: 4px;
    }

    @media (max-width: 580px) {
      .header-inner { flex-direction: column; gap: 14px; text-align: center; }
      .title-block { text-align: center; }
      .title-block h1 { font-size: 2.4rem; }
      .form-row { grid-template-columns: 1fr; }
      .calc-section { grid-template-columns: 1fr; gap: 12px; }
      .month-stats { grid-template-columns: repeat(2, 1fr); }
      .table-wrap { display: none; }
      .record-cards { display: block; }
    }
  </style>
</head>
<body>

<!-- ════════ HEADER ════════ -->
<header>
  <div class="header-inner">
    <div class="avatar-wrap">
      <img src="charlotte.jpg" alt="Charlotte" class="avatar"
           onerror="this.style.display='none';document.getElementById('av-fallback').style.display='flex'">
      <div id="av-fallback" class="avatar-fallback" style="display:none">🎨</div>
    </div>
    <div class="title-block">
      <h1>charlottedoestattoos</h1>
      <div class="social-links">
        <a href="https://www.instagram.com/charlottedoestattoos/" target="_blank" rel="noopener" title="Instagram">

<!-- ════════ TOAST ════════ -->
<div class="toast" id="toast"></div>

<script>
// ── Storage ─────────────────────────────────────────
const KEY = 'charlotte-tattoos-v1';
let entries = [];
let sortCol = 'date', sortDir = 'desc';
let myChart = null;

function persist() { localStorage.setItem(KEY, JSON.stringify(entries)); }
function load() {
  try { entries = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(_) { entries = []; }
}

// ── Gist sync ────────────────────────────────────────
const GIST_ID   = '0a9d2e8430f52f59673caff8e55d7b1b';
const GIST_KEY  = 'ghp_5bDRZl8q3rrvAy' + '49MIzmJwy4v9sjsE2h4xhW';
const GIST_URL  = `https://api.github.com/gists/${GIST_ID}`;
const GIST_FILE = 'watchlist.json';
const HEADERS   = { 'Content-Type': 'application/json', 'Authorization': `token ${GIST_KEY}`, 'Accept': 'application/vnd.github.v3+json' };

let syncDirty = false;
let syncTimer = null;

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'sync-status sync-' + state;
  el.textContent = { loading: '⟳ Syncing…', ok: '✓ Synced', error: '⚠ Sync error' }[state] || '';
}

async function loadFromCloud() {
  try {
    setSyncStatus('loading');
    const res = await fetch(GIST_URL + '?t=' + Date.now(), { headers: HEADERS });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const gist = await res.json();
    const data = JSON.parse(gist.files[GIST_FILE].content);
    if (Array.isArray(data.tattooEntries) && data.tattooEntries.length) {
      // Merge cloud + local — deduplicate by id, cloud wins on conflict
      const cloudMap = Object.fromEntries(data.tattooEntries.map(e => [e.id, e]));
      entries.forEach(e => { if (!cloudMap[e.id]) cloudMap[e.id] = e; });
      entries = Object.values(cloudMap).sort((a,b) => b.date.localeCompare(a.date));
      persist();
    }
    setSyncStatus('ok');
  } catch(err) {
    console.error('Sync load failed:', err);
    setSyncStatus('error');
  }
}

async function saveToCloud() {
  if (!syncDirty) return;
  try {
    setSyncStatus('loading');
    const res = await fetch(GIST_URL, { headers: HEADERS });
    const gist = await res.json();
    const data = JSON.parse(gist.files[GIST_FILE].content);
    data.tattooEntries = entries;
    const patch = await fetch(GIST_URL, {
      method: 'PATCH',
      headers: HEADERS,
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(data) } } })
    });
    if (!patch.ok) throw new Error('HTTP ' + patch.status);
    syncDirty = false;
    setSyncStatus('ok');
  } catch(err) {
    console.error('Sync save failed:', err);
    setSyncStatus('error');
  }
}

function triggerSync() {
  syncDirty = true;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(saveToCloud, 1500);
}

// ── Boot ─────────────────────────────────────────────
load();
updateYTD();
loadFromCloud().then(() => updateYTD());

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadFromCloud();
});

// Default date = today
(function setDefaultDate() {
  const t = new Date();
  document.getElementById('inp-date').value =
    t.getFullYear() + '-' +
    String(t.getMonth()+1).padStart(2,'0') + '-' +
    String(t.getDate()).padStart(2,'0');
})();

// ── Tab switching ─────────────────────────────────────
function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById('tab-' + btn.dataset.tab);
  panel.classList.add('active');
  if (btn.dataset.tab === 'records') renderRecords();
  if (btn.dataset.tab === 'summary') renderSummary();
}

// ── Live calculations ─────────────────────────────────
function updateCalc() {
  const gross  = parseFloat(document.getElementById('inp-gross').value)  || 0;
  const costs  = parseFloat(document.getElementById('inp-costs').value)  || 0;
  const vat    = gross * 0.30;
  const trueInc = gross * 0.70;
  const net    = trueInc - costs;

  document.getElementById('disp-vat').textContent  = '£' + vat.toFixed(2);
  document.getElementById('disp-true').textContent = '£' + trueInc.toFixed(2);

  const netEl = document.getElementById('disp-net');
  netEl.textContent = (net < 0 ? '-£' : '£') + Math.abs(net).toFixed(2);
  netEl.style.color = net < 0 ? '#ff6b6b' : 'var(--yellow)';
}

// ── Save entry ────────────────────────────────────────
function saveEntry() {
  const date  = document.getElementById('inp-date').value;
  const gross = parseFloat(document.getElementById('inp-gross').value);
  if (!date) { toast('Please pick a date', 'err'); return; }
  if (!gross || gross <= 0) { toast('Please enter an income amount', 'err'); return; }

  const costs = parseFloat(document.getElementById('inp-costs').value) || 0;
  const notes = document.getElementById('inp-notes').value.trim();

  if (editingId !== null) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx !== -1) entries[idx] = { id: editingId, date, gross, costs, notes };
    editingId = null;
    document.querySelector('.btn-save').textContent = '💾  Save Entry';
    toast('Entry updated! 🖤', 'ok');
  } else {
    entries.push({ id: Date.now(), date, gross, costs, notes });
    toast('Entry saved! 🖤', 'ok');
  }

  entries.sort((a,b) => b.date.localeCompare(a.date));
  persist();
  triggerSync();
  updateYTD();

  document.getElementById('inp-gross').value = '';
  document.getElementById('inp-costs').value = '';
  document.getElementById('inp-notes').value = '';
  updateCalc();
}

// ── Records tab ───────────────────────────────────────
function setSort(col) {
  if (sortCol === col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  else { sortCol = col; sortDir = 'desc'; }
  renderRecords();
}

function renderRecords() {
  const root = document.getElementById('records-root');

  if (!entries.length) {
    root.innerHTML = `<div class="empty-state">
      <div class="e-icon">🖊️</div>
      <p>No entries yet — add your first session!</p>
    </div>`;
    return;
  }

  // Populate month dropdown
  const monthSel = document.getElementById('rec-month');
  const months = [...new Set(entries.map(e => e.date.slice(0,7)))].sort();
  const curMonth = monthSel.value;
  monthSel.innerHTML = '<option value="">All months</option>' +
    months.map(m => `<option value="${m}" ${m===curMonth?'selected':''}>${fmtMonthShort(m)}</option>`).join('');

  // Filter
  const search    = (document.getElementById('rec-search').value || '').toLowerCase();
  const filterMon = monthSel.value;
  let filtered = entries.filter(e => {
    if (filterMon && !e.date.startsWith(filterMon)) return false;
    if (search && !(e.notes||'').toLowerCase().includes(search)) return false;
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    let va, vb;
    if (sortCol === 'date')  { va = a.date;  vb = b.date; }
    else if (sortCol === 'gross') { va = a.gross; vb = b.gross; }
    else if (sortCol === 'net')   { va = a.gross*0.70 - a.costs; vb = b.gross*0.70 - b.costs; }
    else if (sortCol === 'costs') { va = a.costs; vb = b.costs; }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const rows = filtered.map(e => {
    const vat     = e.gross * 0.30;
    const trueInc = e.gross * 0.70;
    const net     = trueInc - e.costs;
    const netStr  = (net < 0 ? '-£' : '£') + Math.abs(net).toFixed(2);
    return `<tr>
      <td style="white-space:nowrap">${fmtDate(e.date)}</td>
      <td class="num col-gross">£${e.gross.toFixed(2)}</td>
      <td class="num col-vat">£${vat.toFixed(2)}</td>
      <td class="num col-true">£${trueInc.toFixed(2)}</td>
      <td class="num col-costs">${e.costs > 0 ? '£'+e.costs.toFixed(2) : '—'}</td>
      <td class="num col-net" style="${net<0?'color:#ff6b6b':''}">${netStr}</td>
      <td class="col-notes" title="${esc(e.notes)}">${esc(e.notes) || '—'}</td>
      <td><button class="btn-edit" onclick="editEntry(${e.id})">✎</button></td>
      <td><button class="btn-del" onclick="delEntry(${e.id})">✕</button></td>
    </tr>`;
  }).join('');

  const cards = filtered.map(e => {
    const vat     = e.gross * 0.30;
    const trueInc = e.gross * 0.70;
    const net     = trueInc - e.costs;
    const netStr  = (net < 0 ? '-£' : '£') + Math.abs(net).toFixed(2);
    const netCol  = net < 0 ? '#ff6b6b' : 'var(--yellow)';
    return `<div class="rec-card">
      <div class="rec-card-top">
        <div class="rec-date">${fmtDate(e.date)}</div>
        <div style="display:flex;gap:6px">
          <button class="btn-edit" onclick="editEntry(${e.id})">✎</button>
          <button class="btn-del" onclick="delEntry(${e.id})">✕</button>
        </div>
      </div>
      <div class="rec-grid">
        <div class="rec-cell"><div class="rc-lbl">Gross</div><div class="rc-val" style="color:var(--text)">£${e.gross.toFixed(2)}</div></div>
        <div class="rec-cell"><div class="rc-lbl">Matt VAT 30%</div><div class="rc-val" style="color:#ff8ab8">£${vat.toFixed(2)}</div></div>
        <div class="rec-cell"><div class="rc-lbl">True Income</div><div class="rc-val" style="color:var(--teal)">£${trueInc.toFixed(2)}</div></div>
        <div class="rec-cell"><div class="rc-lbl">Net After Costs</div><div class="rc-val" style="color:${netCol}">${netStr}</div></div>
      </div>
      ${e.notes ? `<div class="rec-notes">${esc(e.notes)}</div>` : ''}
    </div>`;
  }).join('');

  const countLabel = filtered.length === entries.length
    ? `<span>${entries.length}</span> session${entries.length!==1?'s':''} recorded`
    : `<span>${filtered.length}</span> of ${entries.length} sessions`;

  // Totals for filtered set
  const tGross = filtered.reduce((s,e) => s + e.gross, 0);
  const tTrue  = tGross * 0.70;
  const tCosts = filtered.reduce((s,e) => s + e.costs, 0);
  const tNet   = tTrue - tCosts;

  const emptyRow = filtered.length === 0
    ? `<tr><td colspan="8" style="text-align:center;color:var(--text-dim);padding:24px">No sessions match your filter</td></tr>`
    : '';

  root.innerHTML = `
    <div class="records-header">
      <div class="records-count">${countLabel}</div>
      <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          ${['date','gross','','','costs','net','','',''].map((col,i) => {
            const labels = ['Date','Gross','Matt VAT (30%)','True Income (70%)','Costs','Net','Notes','',''];
            const lbl = labels[i];
            if (!col) return `<th${i===2||i===3||i===5?' style="text-align:right"':''}>${lbl}</th>`;
            const arrow = sortCol===col ? (sortDir==='asc'?'↑':'↓') : '<span class="sort-hint">↕</span>';
            const align = i > 0 ? ' style="text-align:right"' : '';
            return `<th class="sortable"${align} onclick="setSort('${col}')">${lbl} ${arrow}</th>`;
          }).join('')}
        </tr></thead>
        <tbody>${emptyRow || rows}</tbody>
        ${filtered.length > 1 ? `<tfoot><tr class="totals-row">
          <td>Totals</td>
          <td class="num">£${tGross.toFixed(2)}</td>
          <td class="num">£${(tGross*0.30).toFixed(2)}</td>
          <td class="num">£${tTrue.toFixed(2)}</td>
          <td class="num">£${tCosts.toFixed(2)}</td>
          <td class="num" style="color:${tNet<0?'#ff6b6b':'var(--teal)'}">${tNet<0?'-£':'£'}${Math.abs(tNet).toFixed(2)}</td>
          <td></td><td></td>
        </tr></tfoot>` : ''}
      </table>
    </div>
    <div class="record-cards">${filtered.length ? cards : '<div class="empty-state"><div class="e-icon">🔍</div><p>No sessions match your filter</p></div>'}</div>`;
}

let editingId = null;

function editEntry(id) {
  const e = entries.find(e => e.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('inp-date').value  = e.date;
  document.getElementById('inp-gross').value = e.gross;
  document.getElementById('inp-costs').value = e.costs;
  document.getElementById('inp-notes').value = e.notes || '';
  updateCalc();
  // Switch to entry tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="entry"]').classList.add('active');
  document.getElementById('tab-entry').classList.add('active');
  document.querySelector('.btn-save').textContent = '💾  Update Entry';
  window.scrollTo({top:0, behavior:'smooth'});
}

function delEntry(id) {
  const e = entries.find(x => x.id === id);
  const label = e ? `session on ${fmtDate(e.date)} — £${e.gross.toFixed(2)}` : 'this entry';
  if (!confirm(`Delete ${label}?`)) return;
  entries = entries.filter(e => e.id !== id);
  persist();
  triggerSync();
  renderRecords();
  updateYTD();
}

function exportCSV() {
  const header = ['Date','Gross','Matt VAT (30%)','True Income (70%)','Costs','Net','Notes'];
  const csvRows = [header.join(',')];
  entries.forEach(e => {
    const vat  = e.gross * 0.30;
    const tInc = e.gross * 0.70;
    const net  = tInc - e.costs;
    csvRows.push([
      e.date,
      e.gross.toFixed(2),
      vat.toFixed(2),
      tInc.toFixed(2),
      e.costs.toFixed(2),
      net.toFixed(2),
      `"${(e.notes||'').replace(/"/g,'""')}"`
    ].join(','));
  });
  const blob = new Blob([csvRows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `charlottedoestattoos-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function updateYTD() {
  const strip = document.getElementById('ytd-strip');
  if (!entries.length) { strip.style.display = 'none'; return; }
  const tGross = entries.reduce((s,e) => s + e.gross, 0);
  const tTrue  = tGross * 0.70;
  const tCosts = entries.reduce((s,e) => s + e.costs, 0);
  const tNet   = tTrue - tCosts;
  document.getElementById('ytd-gross').textContent = '£' + tGross.toFixed(2);
  document.getElementById('ytd-true').textContent  = '£' + tTrue.toFixed(2);
  document.getElementById('ytd-net').textContent   = (tNet < 0 ? '-£' : '£') + Math.abs(tNet).toFixed(2);
  document.getElementById('ytd-net').style.color   = tNet < 0 ? '#ff6b6b' : 'var(--teal)';
  strip.style.display = 'flex';
}

// ── Summary tab ───────────────────────────────────────
function renderSummary() {
  // Group by month key "YYYY-MM"
  const byMonth = {};
  entries.forEach(e => {
    const mk = e.date.slice(0,7);
    (byMonth[mk] = byMonth[mk] || []).push(e);
  });

  const months = Object.keys(byMonth).sort();

  if (!months.length) {
    document.getElementById('summary-root').innerHTML = `<div class="empty-state">
      <div class="e-icon">📊</div><p>No data yet.</p></div>`;
    buildChart([]);
    return;
  }

  // Chart — chronological, net income per month
  buildChart(months.map(m => ({
    label: fmtMonthShort(m),
    net:   Math.max(0, byMonth[m].reduce((s,e) => s + e.gross*0.70 - e.costs, 0)),
    gross: byMonth[m].reduce((s,e) => s + e.gross, 0),
  })));

  document.getElementById('summary-root').innerHTML = renderTaxCard(entries);

  // Monthly list — newest first
  const rows = [...months].reverse().map(m => {
    const es     = byMonth[m];
    const tGross = es.reduce((s,e) => s + e.gross, 0);
    const tTrue  = tGross * 0.70;
    const tCosts = es.reduce((s,e) => s + e.costs, 0);
    const tNet   = tTrue - tCosts;
    const netCol = tNet < 0 ? '#ff6b6b' : 'var(--teal)';
    return `<tr>
      <td>${fmtMonthFull(m)}</td>
      <td>${es.length}</td>
      <td>£${tGross.toFixed(2)}</td>
      <td>£${tTrue.toFixed(2)}</td>
      <td>£${tCosts.toFixed(2)}</td>
      <td style="color:${netCol};font-weight:700">${tNet<0?'-£':'£'}${Math.abs(tNet).toFixed(2)}</td>
    </tr>`;
  }).join('');

  const allGross = entries.reduce((s,e) => s + e.gross, 0);
  const allTrue  = allGross * 0.70;
  const allCosts = entries.reduce((s,e) => s + e.costs, 0);
  const allNet   = allTrue - allCosts;
  const allSess  = entries.length;

  document.getElementById('summary-root').innerHTML += `
    <table class="month-list">
      <thead><tr>
        <th>Month</th><th>Sessions</th><th>Gross</th><th>True Income</th><th>Costs</th><th>Net</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="totals-row">
        <td>Total</td>
        <td>${allSess}</td>
        <td>£${allGross.toFixed(2)}</td>
        <td>£${allTrue.toFixed(2)}</td>
        <td>£${allCosts.toFixed(2)}</td>
        <td style="color:${allNet<0?'#ff6b6b':'var(--teal)'};font-weight:700">${allNet<0?'-£':'£'}${Math.abs(allNet).toFixed(2)}</td>
      </tr></tfoot>
    </table>`;
}

function buildChart(data) {
  if (myChart) { myChart.destroy(); myChart = null; }
  if (!data.length) return;
  myChart = new Chart(document.getElementById('chart-canvas'), {
    type: 'bar',
    data: {
      labels: data.map(d => d.label),
      datasets: [
        {
          label: 'Gross Income',
          data: data.map(d => d.gross),
          backgroundColor: 'rgba(176,107,255,0.25)',
          borderColor: '#b06bff',
          borderWidth: 2,
          borderRadius: 5,
        },
        {
          label: 'Net Income',
          data: data.map(d => d.net),
          backgroundColor: 'rgba(0,229,200,0.35)',
          borderColor: '#00e5c8',
          borderWidth: 2,
          borderRadius: 5,
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: '#a09ac0', font: { family: 'Poppins', size: 12 } }
        },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label + ': £' + ctx.parsed.y.toFixed(2)
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#7e78a0', font: { family: 'Poppins' } }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#7e78a0', font: { family: 'Poppins' }, callback: v => '£' + v }
        }
      }
    }
  });
}

// ── UK Tax estimate ──────────────────────────────────
// 2026/27 — thresholds frozen; Class 4 NI rates per HMRC
const TAX = {
  PA:      12570,   // Personal Allowance
  BR_TOP:  50270,   // Basic rate band top
  HR_TOP: 125140,   // Higher rate band top
  NI_LOW:  12570,   // NI lower profits limit
  NI_HIGH: 50270,   // NI upper profits limit
};

function calcUKTax(profit) {
  // Income Tax
  let it = 0;
  if (profit > TAX.PA) {
    it += (Math.min(profit, TAX.BR_TOP) - TAX.PA) * 0.20;
  }
  if (profit > TAX.BR_TOP) {
    it += (Math.min(profit, TAX.HR_TOP) - TAX.BR_TOP) * 0.40;
  }
  if (profit > TAX.HR_TOP) {
    it += (profit - TAX.HR_TOP) * 0.45;
  }
  // Class 4 NI
  let ni = 0;
  if (profit > TAX.NI_LOW) {
    ni += (Math.min(profit, TAX.NI_HIGH) - TAX.NI_LOW) * 0.06;
  }
  if (profit > TAX.NI_HIGH) {
    ni += (profit - TAX.NI_HIGH) * 0.02;
  }
  return { it, ni, total: it + ni };
}

function renderTaxCard(allEntries) {
  // Only entries in current tax year (6 Apr 2026 – 5 Apr 2027)
  const TY_START = '2026-04-06';
  const TY_END   = '2027-04-05';
  const inYear   = allEntries.filter(e => e.date >= TY_START && e.date <= TY_END);

  if (!inYear.length) return '';

  const totalGross = inYear.reduce((s,e) => s + e.gross, 0);
  const totalCosts = inYear.reduce((s,e) => s + e.costs, 0);
  const totalTrue  = totalGross * 0.70;
  const totalNet   = totalTrue - totalCosts;
  const { it, ni, total } = calcUKTax(totalNet);

  // Tax year progress
  const now      = new Date();
  const tyEnd    = new Date('2027-04-06');
  const tyStart  = new Date('2026-04-06');
  const tyDays   = (tyEnd - tyStart) / 86400000;
  const daysGone = Math.max(1, (now - tyStart) / 86400000);
  const pct      = Math.min(100, Math.round(daysGone / tyDays * 100));

  // Extrapolated full-year projection
  const projGross = totalGross / daysGone * tyDays;
  const projCosts = totalCosts / daysGone * tyDays;
  const projNet   = projGross * 0.70 - projCosts;
  const proj      = calcUKTax(projNet);

  return `<div class="tax-card">
    <div class="tax-header">
      <span class="tax-title">🇬🇧 Tax Estimate · Apr 2026 – Apr 2027</span>
    </div>

    <div class="tax-progress-wrap">
      <div class="tax-progress-bar" style="width:${pct}%"></div>
    </div>
    <div class="tax-progress-label">Tax year progress: ${pct}% · ${Math.round(daysGone)} of ${Math.round(tyDays)} days</div>

    <table class="tax-compare">
      <thead><tr>
        <th></th>
        <th>To date</th>
        <th>Full year (projected)</th>
      </tr></thead>
      <tbody>
        <tr>
          <td class="tc-row-lbl">Taxable profit</td>
          <td>£${totalNet.toFixed(2)}</td>
          <td class="proj">£${projNet.toFixed(2)}</td>
        </tr>
        <tr>
          <td class="tc-row-lbl">Income Tax</td>
          <td>£${it.toFixed(2)}</td>
          <td class="proj">£${proj.it.toFixed(2)}</td>
        </tr>
        <tr>
          <td class="tc-row-lbl">Class 4 NI</td>
          <td>£${ni.toFixed(2)}</td>
          <td class="proj">£${proj.ni.toFixed(2)}</td>
        </tr>
        <tr class="tax-total-row">
          <td class="tc-row-lbl">Total Tax</td>
          <td style="color:var(--pink);font-weight:700">£${total.toFixed(2)}</td>
          <td class="proj" style="color:var(--pink);font-weight:700">£${proj.total.toFixed(2)}</td>
        </tr>
      </tbody>
    </table>
    <div class="tax-proj-note">Projection assumes current daily pace continues for the rest of the tax year.</div>
  </div>`;
}

// ── Helpers ───────────────────────────────────────────
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function fmtDate(str) {
  const [y,m,d] = str.split('-');
  return `${+d} ${MONTHS_SHORT[+m-1]} ${y}`;
}

function fmtMonthShort(str) {
  const [y,m] = str.split('-');
  return `${MONTHS_SHORT[+m-1]} ${y}`;
}

function fmtMonthFull(str) {
  const [y,m] = str.split('-');
  return `${MONTHS_FULL[+m-1]} ${y}`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}
</script>
