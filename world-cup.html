      position: relative;
      z-index: 1;
    }

      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;

      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .header-left p {
      font-size: 0.82rem;
      color: #888;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    .header-nav {

      gap: 10px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .back-arrow {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      text-decoration: none;
      font-size: 0.8rem;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      background: #000;
      border-bottom: 1px solid rgba(255,232,31,0.15);
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar.date-bar {
      overflow-x: auto;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 8px 20px;
    }

    .filter-bar.date-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn:hover { border-color: #666; color: #ccc; }

    .filter-btn.active {
      background: #ffe81f;
      border-color: #ffe81f;
      color: #000;
      font-weight: 600;
    }

    .filter-label {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-right: 4px;
      white-space: nowrap;
    }

    main {
      padding: 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    .date-group {
      margin-bottom: 28px;
    }

    .date-header {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: #ffe81f;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,232,31,0.2);
    }

    .match-card {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 10px;
      padding: 13px 16px;
      margin-bottom: 7px;
      display: grid;
      grid-template-columns: 90px 1fr auto 1fr 90px;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .match-card:hover {
      border-color: #2a2a2a;
    }

    .match-card.played {
      opacity: 0.75;
    }

    .match-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      display: inline-block;
      width: fit-content;

    .badge-r32   { background: rgba(99,179,237,0.12); color: #63b3ed; }
    .badge-r16   { background: rgba(104,211,145,0.12); color: #68d391; }
    .badge-qf    { background: rgba(246,173,85,0.12); color: #f6ad55; }
    .badge-sf    { background: rgba(237,100,166,0.12); color: #ed64a6; }
    .badge-3rd   { background: rgba(154,154,154,0.12); color: #9a9a9a; }
    .badge-final { background: rgba(255,232,31,0.25); color: #ffe81f; }

      font-size: 0.8rem;
      color: #777;
      font-variant-numeric: tabular-nums;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .team.home { justify-content: flex-end; text-align: right; }
    .team.away { justify-content: flex-start; }

    .team-flag {
      font-size: 1.35rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .team-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: #e0e0e8;
      line-height: 1.2;
    }

    .team-name.tbd {
      font-size: 0.75rem;
      color: #555;
      font-style: italic;
    }

    .score-block {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 64px;
    }

    .score {
      font-size: 1.1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #e8e8f0;
      min-width: 20px;
      text-align: center;
    }

    .score-sep {
      color: #444;
      font-size: 0.85rem;
    }

    .venue-col {
      display: flex;
      align-items: center;
    }

    .venue {
      font-size: 0.7rem;
      color: #555;
      text-align: right;
      line-height: 1.3;
    }

    .no-matches {
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      padding: 60px 0;
    }

      text-align: center;
      padding: 32px 20px;
      font-size: 0.75rem;
      color: #444;
      border-top: 1px solid #111;

        grid-template-rows: auto auto;

// ── State ─────────────────────────────────────────────────────────
let activeRound = 'all';
let activeDate  = 'all';

// ── Helpers ───────────────────────────────────────────────────────
function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00Z');
  return dt.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric', timeZone:'UTC' });
}

function fmtDateShort(d) {
  const dt = new Date(d + 'T00:00:00Z');
  return dt.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', timeZone:'UTC' });
}

function roundLabel(round) {
  return {group:'Group', r32:'R32', r16:'R16', qf:'QF', sf:'SF', '3rd':'3rd', final:'Final'}[round];
}

function badgeClass(round) {
  return 'badge-' + round;
}

function roundTitle(round) {
  return {group:'Group Stage', r32:'Round of 32', r16:'Round of 16', qf:'Quarter-final', sf:'Semi-final', '3rd':'Third Place Play-off', final:'FINAL'}[round];
}

// ── Filters ───────────────────────────────────────────────────────
function filteredFixtures() {
  return FIXTURES.filter(f => {
    const roundOk = activeRound === 'all' || f.round === activeRound;
    const dateOk  = activeDate  === 'all' || f.date  === activeDate;
    return roundOk && dateOk;
  });
}

function availableDates() {
  const roundFiltered = activeRound === 'all'
    ? FIXTURES
    : FIXTURES.filter(f => f.round === activeRound);
  return [...new Set(roundFiltered.map(f => f.date))].sort();
}

// ── Render date filter ─────────────────────────────────────────────
function renderDateFilter() {
  const dates = availableDates();
  const bar = document.getElementById('date-filter');
  bar.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (activeDate === 'all' ? ' active' : '');
  allBtn.textContent = 'All dates';
  allBtn.dataset.date = 'all';
  allBtn.addEventListener('click', () => { activeDate = 'all'; renderAll(); });
  bar.appendChild(allBtn);

  dates.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeDate === d ? ' active' : '');
    btn.textContent = fmtDateShort(d);
    btn.dataset.date = d;
    btn.addEventListener('click', () => { activeDate = d; renderAll(); });
    bar.appendChild(btn);
  });
}

// ── Render fixtures ───────────────────────────────────────────────
function renderFixtures() {
  const list = filteredFixtures();
  const container = document.getElementById('fixtures-container');
  container.innerHTML = '';

  if (!list.length) {
    container.innerHTML = '<p class="no-matches">No matches for this selection.</p>';
    return;
  }

  // Group by date
  const byDate = {};
  list.forEach(f => {
    if (!byDate[f.date]) byDate[f.date] = [];
    byDate[f.date].push(f);
  });

  Object.keys(byDate).sort().forEach(date => {
    const group = document.createElement('div');
    group.className = 'date-group';

    const header = document.createElement('div');
    header.className = 'date-header';
    header.textContent = fmtDate(date);
    group.appendChild(header);

    byDate[date].forEach(f => {
      group.appendChild(buildCard(f));
    });

    container.appendChild(group);
  });
}

function buildCard(f) {
  const isGroup = f.round === 'group';
  const homeFlag = FLAGS[f.home] || '';
  const awayFlag = FLAGS[f.away] || '';
  const homeTbd  = !FLAGS[f.home];
  const awayTbd  = !FLAGS[f.away];

  function flagHtml(flag) {
    if (!flag) return '';
    if (flag.startsWith('http')) return `<img src="${flag}" alt="" style="width:26px;height:auto;border-radius:2px;flex-shrink:0;">`;
    return `<span class="team-flag">${flag}</span>`;
  }

  const card = document.createElement('div');
  card.className = 'match-card' + (f.homeScore !== null ? ' played' : '');

  // Left meta column
  const meta = document.createElement('div');
  meta.className = 'match-meta';

  const badge = document.createElement('span');
  badge.className = 'round-badge ' + badgeClass(f.round);
  badge.textContent = isGroup ? 'Group ' + f.group : roundTitle(f.round);
  meta.appendChild(badge);

  const time = document.createElement('div');
  time.className = 'match-time';
  time.textContent = f.time + ' GMT';
  meta.appendChild(time);

  // Home team
  const home = document.createElement('div');
  home.className = 'team home';
  home.innerHTML = `<span class="team-name${homeTbd ? ' tbd' : ''}">${f.home}</span>${flagHtml(homeFlag)}`;

  // Score / vs
  const scoreBlock = document.createElement('div');
  scoreBlock.className = 'score-block';
  if (f.homeScore != null) {
    scoreBlock.innerHTML = `<span class="score">${f.homeScore}</span><span class="score-sep">–</span><span class="score">${f.awayScore}</span>`;
  } else {
    scoreBlock.innerHTML = `<span class="score-sep" style="font-size:0.75rem;letter-spacing:1px">v</span>`;
  }

  // Away team
  const away = document.createElement('div');
  away.className = 'team away';
  away.innerHTML = `${flagHtml(awayFlag)}<span class="team-name${awayTbd ? ' tbd' : ''}">${f.away}</span>`;

  // Venue
  const venueCol = document.createElement('div');
  venueCol.className = 'venue-col';
  const venueSpan = document.createElement('span');
  venueSpan.className = 'venue';
  venueSpan.textContent = f.venue;
  venueCol.appendChild(venueSpan);

  card.appendChild(meta);
  card.appendChild(home);
  card.appendChild(scoreBlock);
  card.appendChild(away);
  card.appendChild(venueCol);

  return card;
}

// ── Main render ───────────────────────────────────────────────────
function renderAll() {
  renderDateFilter();
  renderFixtures();
  // Sync round buttons
  document.querySelectorAll('#round-filter .filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.round === activeRound);
  });
  // Sync date buttons
  document.querySelectorAll('#date-filter .filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === activeDate);
  });
}

// ── Wire round filter buttons ─────────────────────────────────────
document.querySelectorAll('#round-filter .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeRound = btn.dataset.round;
    activeDate  = 'all';
    renderAll();
  });
});

// ── Init ──────────────────────────────────────────────────────────
renderAll();

// Auto-scroll date filter to today or next upcoming match
(function scrollToToday() {
  const today = new Date().toISOString().slice(0,10);
  const upcoming = FIXTURES.find(f => f.date >= today);
  if (!upcoming) return;
  const targetDate = upcoming.date;
  const bar = document.getElementById('date-filter');
  const btn = bar.querySelector(`[data-date="${targetDate}"]`);
  if (btn) btn.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
})();
</script>
